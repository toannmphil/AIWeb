<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--surface:#1e293b;--surface2:#334155;--border:#475569;--text:#e2e8f0;--text2:#94a3b8;--primary:#3b82f6;--primary-hover:#2563eb;--green:#22c55e;--yellow:#eab308;--red:#ef4444;--orange:#f97316;--purple:#a855f7;--cyan:#06b6d4;--pink:#ec4899}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh}
.app{display:flex;flex-direction:column;height:100vh}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0}
.header h1{font-size:16px;font-weight:700;white-space:nowrap}
.header h1 span{color:var(--primary)}
.header-actions{display:flex;gap:8px;align-items:center}
.btn{padding:6px 14px;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-hover)}
.btn-success{background:var(--green);color:#fff}.btn-success:hover{opacity:.9}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{background:var(--surface2)}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{opacity:.9}
.btn-sm{padding:4px 10px;font-size:11px}
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:6px 16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;flex-shrink:0}
.filter-group{display:flex;align-items:center;gap:4px}
.filter-group label{font-size:11px;color:var(--text2);font-weight:600}
select,input[type=text]{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-size:12px;outline:none}
select:focus,input:focus{border-color:var(--primary)}
.search-box{width:180px}
.stats{margin-left:auto;display:flex;gap:12px;font-size:11px;color:var(--text2)}
.stats .stat{display:flex;align-items:center;gap:4px}
.stats .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.main{display:flex;flex:1;overflow:hidden}
.task-panel{width:480px;min-width:400px;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.task-panel-header{padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.task-panel-header h2{font-size:13px;font-weight:700}
.task-list{flex:1;overflow-y:auto;overflow-x:hidden}
.task-list::-webkit-scrollbar{width:6px}
.task-list::-webkit-scrollbar-track{background:var(--surface)}
.task-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.task-row{display:flex;align-items:center;padding:0 8px;height:32px;border-bottom:1px solid rgba(71,85,105,.3);cursor:pointer;transition:background .1s;font-size:12px}
.task-row:hover{background:rgba(59,130,246,.08)}
.task-row.selected{background:rgba(59,130,246,.15)}
.task-row.parent{background:rgba(59,130,246,.05);font-weight:700}
.task-row .expand-btn{width:18px;height:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:10px;flex-shrink:0;border-radius:3px;transition:all .15s}
.task-row .expand-btn:hover{background:var(--surface2)}
.task-row .indent{flex-shrink:0}
.task-row .task-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 6px}
.task-row .task-name input{background:transparent;border:none;color:var(--text);width:100%;font-size:12px;outline:none;font-family:inherit}
.task-row .team-badge{font-size:9px;padding:1px 5px;border-radius:3px;color:#fff;font-weight:600;flex-shrink:0;margin-right:4px;letter-spacing:.3px}
.task-row .priority-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-right:4px}
.task-row .status-badge{font-size:10px;padding:1px 6px;border-radius:3px;flex-shrink:0;font-weight:600}
.task-row .pct{font-size:10px;color:var(--text2);width:28px;text-align:right;flex-shrink:0}
.task-row .task-date{font-size:10px;color:var(--text2);width:44px;text-align:center;flex-shrink:0;font-variant-numeric:tabular-nums}
.gantt-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.gantt-header{display:flex;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.gantt-week{min-width:180px;text-align:center;padding:4px;border-right:1px solid rgba(71,85,105,.3);font-size:10px;font-weight:600;color:var(--text2)}
.gantt-week .week-num{color:var(--primary);font-size:11px}
.gantt-body{flex:1;overflow:auto;position:relative}
.gantt-body::-webkit-scrollbar{width:6px;height:6px}
.gantt-body::-webkit-scrollbar-track{background:var(--surface)}
.gantt-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.gantt-row{display:flex;height:32px;border-bottom:1px solid rgba(71,85,105,.15);position:relative}
.gantt-cell{min-width:180px;position:relative;border-right:1px solid rgba(71,85,105,.15)}
.gantt-cell.today{background:rgba(59,130,246,.05)}
.gantt-bar{position:absolute;top:5px;height:22px;border-radius:4px;display:flex;align-items:center;font-size:10px;font-weight:600;color:#fff;cursor:pointer;transition:opacity .15s;z-index:2;min-width:12px;padding:0 6px;overflow:hidden}
.gantt-bar:hover{opacity:.85;z-index:3;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.gantt-bar .bar-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;text-shadow:0 1px 2px rgba(0,0,0,.5)}
.gantt-bar-progress{position:absolute;left:0;top:0;bottom:0;border-radius:4px;opacity:.3;background:#fff}
.dep-line{position:absolute;pointer-events:none;z-index:1}
.detail-overlay{position:fixed;top:0;right:0;width:380px;height:100%;background:var(--surface);border-left:1px solid var(--border);z-index:100;transform:translateX(100%);transition:transform .2s;overflow-y:auto;padding:16px}
.detail-overlay.open{transform:translateX(0)}
.detail-overlay h3{font-size:14px;margin-bottom:12px}
.detail-overlay .field{margin-bottom:10px}
.detail-overlay .field label{display:block;font-size:11px;color:var(--text2);margin-bottom:3px;font-weight:600}
.detail-overlay .field input,.detail-overlay .field select,.detail-overlay .field textarea{width:100%;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:6px 8px;font-size:12px;outline:none;font-family:inherit}
.detail-overlay .field input[type=date]{width:28px;min-width:28px;padding:0;border:none;background:transparent;cursor:pointer;opacity:.6}
.detail-overlay .field textarea{height:60px;resize:vertical}
.detail-overlay .close-btn{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer}
.team-Art{background:#9b59b6}.team-Dev{background:#2980b9}.team-Design{background:#e67e22}
.team-Multimedia{background:#1abc9c}.team-PM{background:#34495e}.team-OP{background:#7f8c8d}.team-QC{background:#c0392b}
.team-Client{background:#16a085}.team-Server{background:#8e44ad}
.pri-High{background:var(--red)}.pri-Normal{background:var(--yellow)}.pri-Low{background:var(--green)}
.status-notstarted{background:var(--surface2);color:var(--text2)}
.status-progress{background:rgba(59,130,246,.2);color:var(--primary)}
.status-completed{background:rgba(34,197,94,.2);color:var(--green)}
.status-onhold{background:rgba(239,68,68,.2);color:var(--red)}
.critical .gantt-bar{box-shadow:0 0 0 2px var(--red)}
.resize-handle{position:absolute;top:0;right:-3px;width:8px;height:100%;cursor:col-resize;z-index:10}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;width:500px;max-height:80vh;overflow-y:auto}
.modal.wide{width:700px}
.modal h3{margin-bottom:12px;font-size:16px}
.modal .field{margin-bottom:10px}
.modal .field label{display:block;font-size:11px;color:var(--text2);margin-bottom:3px;font-weight:600}
.modal .field input,.modal .field select,.modal .field textarea{width:100%;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:6px 8px;font-size:12px;outline:none;font-family:inherit}
.modal .field input[type=date]{width:28px;min-width:28px;padding:0;border:none;background:transparent;cursor:pointer;opacity:.6}

.admin-tab{padding:6px 16px;border-radius:4px 4px 0 0;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);transition:all .15s}
.admin-tab.active{background:var(--primary);color:#fff}

.admin-table{width:100%;border-collapse:collapse;font-size:12px}

.admin-table td{padding:5px 8px;border-bottom:1px solid rgba(71,85,105,.3)}
.admin-table tr:hover{background:rgba(59,130,246,.05)}
.admin-table input{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:3px 6px;font-size:12px;outline:none;width:100%}
.admin-table select{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:3px 6px;font-size:12px;outline:none}
.confirm-dialog{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;width:420px}
.confirm-dialog h4{margin-bottom:8px;font-size:14px;color:var(--red)}
.confirm-dialog p{font-size:13px;margin-bottom:16px;color:var(--text2);line-height:1.5}
.toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:#fff;padding:10px 16px;border-radius:6px;font-size:13px;font-weight:600;z-index:300;animation:slideIn .3s}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.btn-update{background:var(--green);color:#fff;border:none;border-radius:6px;padding:6px 16px;font-size:12px;font-weight:600;cursor:pointer;transition:all .3s;display:inline-flex;align-items:center;gap:5px;min-width:90px;justify-content:center}
.btn-update:hover{opacity:.9}
.btn-update.saving{background:var(--surface2);color:var(--text2);pointer-events:none}
@keyframes dotPulse{0%,80%,100%{opacity:.3}40%{opacity:1}}
.saving-dots span{animation:dotPulse 1.4s infinite;font-size:16px;line-height:1}.saving-dots span:nth-child(2){animation-delay:.2s}.saving-dots span:nth-child(3){animation-delay:.4s}
.delete-link{background:none;border:none;color:var(--text2);font-size:11px;font-weight:700;cursor:pointer;text-decoration:underline;opacity:.5;padding:4px 0}.delete-link:hover{color:var(--red);opacity:1}
.mention{background:#1e3a5f;color:#60a5fa;border-radius:3px;padding:0 4px;font-weight:600;display:inline;white-space:nowrap}
.mention-container{position:relative}
.mention-dropdown{position:absolute;left:0;bottom:100%;margin-bottom:4px;background:var(--surface);border:1px solid var(--border);border-radius:6px;box-shadow:0 4px 12px rgba(0,0,0,.3);max-height:200px;overflow-y:auto;z-index:1000;min-width:180px}
.mention-dropdown-item{padding:8px 12px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:6px}
.mention-dropdown-item:hover,.mention-dropdown-item.active{background:var(--surface2)}
.mention-dropdown-item .team-label{font-size:10px;color:var(--text2);margin-left:auto}
input[type=date]{width:28px;min-width:28px;padding:0;border:none;background:transparent;cursor:pointer;opacity:.6}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.7);cursor:pointer}
input[type=date]::-webkit-datetime-edit{display:none}
.view-tabs{display:flex;gap:2px}
.view-tab{padding:5px 12px;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;color:var(--text2);transition:all .15s}
.view-tab.active{background:var(--primary);color:#fff}
.view-tab:hover:not(.active){background:var(--surface2)}
/* ── Responsive: Tablet/Mobile (≤768px) ── */
@media (max-width:768px){

.btn-sm{padding:6px 10px;font-size:12px}

.detail-overlay{width:100%;left:0}

.modal .field input,.modal .field select,.modal .field textarea{padding:10px 12px;font-size:14px}

/* ── Responsive: Phone (≤480px) ── */
@media (max-width:480px){

.header h1{font-size:12px}

.login-form{width:calc(100vw - 32px)!important;padding:24px!important}
}

function d(s){if(!s)return new Date(0);const p=s.split('/');return new Date(+p[2],+p[1]-1,+p[0])}
function fmt(dt){if(!dt)return'';return `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}/${dt.getFullYear()}`}
function addDays(dt,n){return new Date(dt.getTime()+n*DAY_MS)}
function diffDays(a,b){return Math.round((b-a)/DAY_MS)}
function workingDays(a,b){let count=0;let cur=new Date(a);while(cur<=b){const day=cur.getDay();if(day!==0&&day!==6)count++;cur=new Date(cur.getTime()+DAY_MS)}return Math.max(count-1,0)}
function addWorkingDays(dt,n){let cur=new Date(dt);let added=0;while(added<n){cur=new Date(cur.getTime()+DAY_MS);const day=cur.getDay();if(day!==0&&day!==6)added++}return cur}

function skipWeekend(dt){

function isValidDate(s){if(!s)return false;const p=s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);if(!p)return false;const dt=new Date(+p[3],+p[2]-1,+p[1]);return dt.getDate()===+p[1]&&dt.getMonth()===+p[2]-1&&dt.getFullYear()===+p[3]}

function isParent(task){return task.children&&task.children.length>0}

function flattenTasks(tasks){
  const result=[];
  function flatten(arr,level,parentWbs){
    arr.forEach((t,i)=>{
      t._wbs=parentWbs?(parentWbs+'.'+(i+1)):String(i+1);
      t._level=level;
      result.push(t);
      if(isParent(t)&&t.expanded){
        flatten(t.children,level+1,t._wbs);
      }
    });
  }
  flatten(tasks,0,'');
  return result;
}

function getAllTasks(tasks){
  const result=[];
  function scan(arr){(arr||[]).forEach(t=>{result.push(t);if(t.children)scan(t.children)})}
  scan(tasks);
  return result;
}

function flattenAllTasks(tasks){
  const result=[];
  function flatten(arr,level,parentWbs){
    arr.forEach((t,i)=>{
      const wbs=parentWbs?(parentWbs+'.'+(i+1)):String(i+1);
      result.push({...t,_wbs:wbs,_level:level});
      if(t.children&&t.children.length>0){flatten(t.children,level+1,wbs)}
    });
  }
  flatten(tasks,0,'');
  return result;
}

function findTask(tasks,id){
  for(const t of tasks){
    if(t.id===id)return t;
    if(t.children){const found=findTask(t.children,id);if(found)return found;}
  }
  return null;
}

function findTaskWithParent(tasks,id,parent){
  for(let i=0;i<tasks.length;i++){
    if(tasks[i].id===id)return{task:tasks[i],parent,siblings:tasks,index:i};
    if(tasks[i].children){const found=findTaskWithParent(tasks[i].children,id,tasks[i]);if(found)return found;}
  }
  return null;
}

function computeParentFields(task){
  if(!isParent(task))return;
  task.children.forEach(c=>{if(isParent(c))computeParentFields(c)});
  let minS=null,maxE=null,totalWeightedPct=0,totalDuration=0;
  function collectLeaves(children){
    children.forEach(c=>{
      if(isParent(c)){collectLeaves(c.children);return}
      if(!c.start||!c.end)return;
      const s=d(c.start),e=d(c.end);
      if(s&&!isNaN(s)&&(!minS||s<minS))minS=s;
      if(e&&!isNaN(e)&&(!maxE||e>maxE))maxE=e;
      const dur=workingDays(s,e)||1;
      totalWeightedPct+=(c.pct||0)*dur;
      totalDuration+=dur;
    });
  }
  collectLeaves(task.children);
  if(minS)task.start=fmt(minS);
  if(maxE)task.end=fmt(maxE);
  task.pct=totalDuration>0?Math.round(totalWeightedPct/totalDuration):0;
}

function getDepEndDate(dep,depTask){
  if(!depTask)return null;
  const type=(dep.type||'FS').toUpperCase();
  const lag=dep.lag||0;
  const depStart=d(depTask.start),depEnd=d(depTask.end);
  let base=null;
  if(type==='FS')base=depEnd;
  else if(type==='SS')base=addDays(depStart,-1);
  else if(type==='FF')base=depEnd;
  else if(type==='SF')base=addDays(depStart,-1);
  if(base)base=addDays(base,lag);
  return base;
}

function autoSchedule(tasks){
  const all=getAllTasks(tasks);
  const map=new Map(all.map(t=>[t.id,t]));
  const visited=new Set();
  function resolve(t){
    if(visited.has(t.id)||!t.deps||t.deps.length===0)return;
    visited.add(t.id);
    let maxEnd=null;
    t.deps.forEach(dep=>{
      const depId=typeof dep==='number'?dep:dep.id;
      const depTask=map.get(depId);
      if(depTask){
        resolve(depTask);
        const depEnd=typeof dep==='object'?getDepEndDate(dep,depTask):d(depTask.end);
        if(depEnd&&(!maxEnd||depEnd>maxEnd))maxEnd=depEnd;
      }
    });
    if(maxEnd){
      const curStart=d(t.start);
      const curEnd=d(t.end);
      const duration=diffDays(curStart,curEnd);
      let newStart=addDays(maxEnd,1);
      newStart=skipWeekend(newStart).date;
      if(newStart>curStart){
        t.start=fmt(newStart);
        let newEnd=addDays(newStart,duration);
        newEnd=skipWeekend(newEnd).date;
        t.end=fmt(newEnd);
      }
    }
  }
  // Schedule leaf tasks only
  all.filter(t=>!isParent(t)).forEach(t=>resolve(t));
  // Compute parent fields bottom-up
  function computeParents(arr){
    (arr||[]).forEach(t=>{
      if(isParent(t)){computeParents(t.children);computeParentFields(t)}
    });
  }
  computeParents(tasks);
}

function computeCriticalPath(tasks){
  const all=getAllTasks(tasks).filter(t=>!isParent(t));
  const map=new Map(all.map(t=>[t.id,t]));
  const ids=new Set();
  let latest=null;
  all.forEach(t=>{if(!latest||d(t.end)>d(latest.end))latest=t});
  if(!latest)return ids;
  function trace(t){
    ids.add(t.id);
    if(!t.deps)return;
    let maxDep=null;
    t.deps.forEach(dep=>{
      const depId=typeof dep==='number'?dep:dep.id;
      const depTask=map.get(depId);
      if(depTask&&(!maxDep||d(depTask.end)>d(maxDep.end)))maxDep=depTask;
    });
    if(maxDep)trace(maxDep);
  }
  trace(latest);
  return ids;
}

/* ── API Layer (multi-project) ── */
const LS_KEY='ptb_project';
function lsLoad(projectId){try{const v=localStorage.getItem(projectId?`ptb_p${projectId}`:LS_KEY);return v?JSON.parse(v):null}catch(e){return null}}
function lsSave(data,projectId){try{localStorage.setItem(projectId?`ptb_p${projectId}`:LS_KEY,JSON.stringify(data))}catch(e){}}

let AUTH_TOKEN=localStorage.getItem('ptb_token')||null;
let CURRENT_VERSION=null;
let CURRENT_PROJECT_ID=null;

async function apiCall(method,path,body){
  const opts={method,headers:{'Content-Type':'application/json'}};
  if(AUTH_TOKEN)opts.headers['Authorization']='Bearer '+AUTH_TOKEN;
  if(body)opts.body=JSON.stringify(body);
  const res=await fetch(path,opts);
  if(res.status===401){AUTH_TOKEN=null;localStorage.removeItem('ptb_token');window.__showLogin?.();throw new Error('Unauthorized')}
  const data=await res.json();
  if(!res.ok)throw new Error(data.error||'API error');
  return data;
}

async function apiLoadProjects(){
  return apiCall('GET','/api/projects');
}

async function apiLoad(projectId){
  const pid=projectId||CURRENT_PROJECT_ID;
  if(!pid)return lsLoad();
  try{
    const res=await apiCall('GET',`/api/project/${pid}`);
    CURRENT_VERSION=res.version;
    lsSave(res.data,pid);
    return res.data;
  }catch(e){console.warn('API load failed, using localStorage',e);return lsLoad(pid)}
}

let _saveTimer=null;
async function apiSave(data,projectId){
  const pid=projectId||CURRENT_PROJECT_ID;
  lsSave(data,pid);
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(async()=>{
    try{
      const res=await apiCall('PUT',`/api/project/${pid}`,{data,version:CURRENT_VERSION});
      CURRENT_VERSION=res.version;
    }catch(e){
      if(e.message&&e.message.includes('conflict')){
        try{
          const verRes=await apiCall('GET',`/api/project/${pid}/version`);
          CURRENT_VERSION=verRes.version;
          const res2=await apiCall('PUT',`/api/project/${pid}`,{data,version:CURRENT_VERSION});
          CURRENT_VERSION=res2.version;
        }catch(e2){console.warn('Retry save failed',e2)}
      }else{console.warn('API save failed',e)}
    }
  },1000);
}

async function apiLoadSettings(){
  return apiCall('GET','/api/settings');
}

async function apiSaveSettings(data){
  return apiCall('PUT','/api/settings',{data});
}

let _settingsTimer=null;
async function apiSaveSettingsDebounced(data){
  clearTimeout(_settingsTimer);
  _settingsTimer=setTimeout(async()=>{
    try{await apiSaveSettings(data)}catch(e){console.warn('Settings save failed',e)}
  },1000);
}

/* ── DatePicker ── */
function DatePicker({value,onChange,onWeekendSkip,label}){
  const ref=useRef(null);
  const [text,setText]=useState(value||'');
  useEffect(()=>{setText(value||'')},[value]);
  function handleText(e){
    let v=e.target.value;
    const digits=v.replace(/[^\d]/g,'');
    if(digits.length<=2)v=digits;
    else if(digits.length<=4)v=digits.slice(0,2)+'/'+digits.slice(2);
    else v=digits.slice(0,2)+'/'+digits.slice(2,4)+'/'+digits.slice(4,8);
    setText(v);
    if(isValidDate(v)){
      const dt=d(v);
      const sk=skipWeekend(dt);
      if(sk.skipped){
        const fixed=fmt(sk.date);setText(fixed);onChange(fixed);
        if(onWeekendSkip)onWeekendSkip(fixed);
      } else { onChange(v); }
    }
  }
  function handleCalendar(e){
    const p=e.target.value.split('-');
    const ddmm=`${p[2]}/${p[1]}/${p[0]}`;
    const dt=d(ddmm);
    const sk=skipWeekend(dt);
    if(sk.skipped){
      const fixed=fmt(sk.date);setText(fixed);onChange(fixed);
      if(onWeekendSkip)onWeekendSkip(fixed);
    } else { setText(ddmm);onChange(ddmm); }
  }
  const isoVal=value&&isValidDate(value)?value.split('/').reverse().join('-'):'';
  return(
    <div style={{display:'flex',gap:4,alignItems:'center'}}>
      <input type="text" value={text} onChange={handleText} placeholder="DD/MM/YYYY" maxLength={10}
        style={{flex:1,fontVariantNumeric:'tabular-nums'}}/>
      <input type="date" value={isoVal} onChange={handleCalendar} ref={ref}
        style={{width:28,padding:0,border:'none',background:'transparent',cursor:'pointer',opacity:.6}}/>
    </div>
  );
}

/* ── DepsSelector (WBS text input: e.g. "2.3, 1.1") ── */
function DepsSelector({deps,onChange,allTasks,currentTaskId,onDepsAutoDate,rootTasks}){
  const available=allTasks.filter(t=>t.id!==currentTaskId);
  const allFlat=rootTasks?flattenAllTasks(rootTasks):[];
  const wbsToId={};const idToWbs={};
  allFlat.forEach(t=>{if(t._wbs){wbsToId[t._wbs]=t.id;idToWbs[t.id]=t._wbs}});

  const depIds=(deps||[]).map(dep=>typeof dep==='number'?dep:dep.id);
  const depsWbsStr=depIds.map(id=>idToWbs[id]||'?'+id).join(', ');
  const [inputVal,setInputVal]=useState(depsWbsStr);
  const prevDepsRef=useRef(depsWbsStr);

  useEffect(()=>{
    const newStr=depIds.map(id=>idToWbs[id]||'?'+id).join(', ');
    if(newStr!==prevDepsRef.current){setInputVal(newStr);prevDepsRef.current=newStr}
  },[deps,idToWbs]);

  function applyInput(val){
    const parts=val.split(/[,;]/).map(s=>s.trim()).filter(Boolean);
    const newDeps=[];const invalid=[];
    parts.forEach(wbs=>{
      const id=wbsToId[wbs];
      if(id!==undefined&&id!==currentTaskId){
        const existing=(deps||[]).find(dep=>(typeof dep==='number'?dep:dep.id)===id);
        newDeps.push(existing||{id,type:'FS',lag:0});
      }else if(wbs){invalid.push(wbs)}
    });
    onChange(newDeps);
    if(onDepsAutoDate)onDepsAutoDate(newDeps);
    return invalid;
  }

  function removeDep(id){
    const newDeps=deps.filter(dep=>(typeof dep==='number'?dep:dep.id)!==id);
    onChange(newDeps);
    const newStr=newDeps.map(dep=>{const did=typeof dep==='number'?dep:dep.id;return idToWbs[did]||'?'+did}).join(', ');
    setInputVal(newStr);prevDepsRef.current=newStr;
    if(onDepsAutoDate)onDepsAutoDate(newDeps);
  }
  function updateDepType(id,type){
    const newDeps=deps.map(dep=>{
      const did=typeof dep==='number'?dep:dep.id;
      if(did===id)return{id:did,type,lag:typeof dep==='object'?dep.lag||0:0};
      return dep;
    });
    onChange(newDeps);
    if(onDepsAutoDate)onDepsAutoDate(newDeps);
  }
  function updateDepLag(id,lag){
    const newDeps=deps.map(dep=>{
      const did=typeof dep==='number'?dep:dep.id;
      if(did===id)return{id:did,type:typeof dep==='object'?dep.type||'FS':'FS',lag};
      return dep;
    });
    onChange(newDeps);
    if(onDepsAutoDate)onDepsAutoDate(newDeps);
  }

  return(
    <div className="field">
      <label>Dependencies (nhập WBS, vd: 2.3, 1.1)</label>
      <input value={inputVal} onChange={e=>setInputVal(e.target.value)}
        onBlur={()=>{const inv=applyInput(inputVal);if(inv.length>0){setInputVal(prev=>{const valid=depIds.map(id=>idToWbs[id]||'?'+id);return valid.join(', ')})}}}
        onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();applyInput(inputVal)}}}
        placeholder="vd: 1.1, 2.3, 3.2" style={{fontSize:11,fontFamily:'monospace'}}/>
      {deps.length>0&&(
        <div style={{marginTop:6}}>
          {deps.map(dep=>{
            const did=typeof dep==='number'?dep:dep.id;
            const dtype=typeof dep==='object'?dep.type||'FS':'FS';
            const dlag=typeof dep==='object'?dep.lag||0:0;
            const depTask=available.find(t=>t.id===did);
            const wbs=idToWbs[did]||'?';
            return(
              <div key={did} style={{display:'flex',gap:4,alignItems:'center',marginBottom:3,fontSize:11}}>
                <span style={{minWidth:36,fontFamily:'monospace',color:'var(--cyan)',fontWeight:700}}>{wbs}</span>
                <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'var(--text2)'}}>{depTask?depTask.name:'?'}</span>
                <select value={dtype} onChange={e=>updateDepType(did,e.target.value)} style={{width:50,fontSize:10,padding:'1px 2px'}}>
                  {DEP_TYPES.map(t=><option key={t}>{t}</option>)}
                </select>
                <input type="number" value={dlag} onChange={e=>updateDepLag(did,parseInt(e.target.value)||0)} style={{width:40,fontSize:10,padding:'1px 2px',textAlign:'center'}} title="Lag (days)"/>
                <button onClick={()=>removeDep(did)} style={{background:'none',border:'none',color:'var(--red)',cursor:'pointer',fontSize:12,padding:'0 2px'}}>✕</button>
              </div>
            );
          })}
        </div>
      )}
      <div style={{fontSize:10,color:'var(--text2)',marginTop:2}}>Nhập mã WBS cách nhau bởi dấu phẩy. Type: FS, SS, FF, SF. Lag: số ngày delay.</div>
    </div>
  );
}

/* ── ParentSelector (WBS input for parent task) ── */
function ParentSelector({currentParentId,availableParents,rootTasks,onMove,currentTaskId}){
  const allFlat=flattenAllTasks(rootTasks);
  const wbsToId={};const idToWbs={};
  allFlat.forEach(t=>{if(t._wbs){wbsToId[t._wbs]=t.id;idToWbs[t.id]=t._wbs}});
  const currentWbs=currentParentId?idToWbs[currentParentId]||'':'';
  const [inputVal,setInputVal]=useState(currentWbs);
  const [error,setError]=useState('');
  const availableIds=new Set(availableParents.map(t=>t.id));
  const prevParentRef=useRef(currentParentId);

  useEffect(()=>{
    if(currentParentId!==prevParentRef.current){
      setInputVal(currentParentId?idToWbs[currentParentId]||'':'');
      prevParentRef.current=currentParentId;
      setError('');
    }
  },[currentParentId,idToWbs]);

  function applyInput(val){
    const trimmed=val.trim();
    if(!trimmed){onMove(null);setError('');return}
    const id=wbsToId[trimmed];
    if(id===undefined){setError('WBS "'+trimmed+'" không tồn tại');return}
    if(id===currentTaskId){setError('Không thể chọn chính nó');return}
    if(!availableIds.has(id)){setError('Không thể chọn task con của chính nó');return}
    setError('');onMove(id);
  }

  const parentTask=currentParentId?allFlat.find(t=>t.id===currentParentId):null;

  return(
    <div className="field">
      <label>Task cha (nhập WBS, vd: 2.1)</label>
      <input value={inputVal} onChange={e=>{setInputVal(e.target.value);setError('')}}
        onBlur={()=>applyInput(inputVal)}
        onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();applyInput(inputVal)}}}
        placeholder="Để trống = top level" style={{fontSize:11,fontFamily:'monospace'}}/>
      {error&&<div style={{fontSize:10,color:'var(--red)',marginTop:2}}>{error}</div>}
      {parentTask&&!error&&<div style={{fontSize:10,color:'var(--text2)',marginTop:2}}>{currentWbs} — {parentTask.name}</div>}
    </div>
  );
}

/* ── AddTaskModal (unified: no phase) ── */
function AddTaskModal({tasks,teams,members,teamColors,onAdd,onClose,showToast,parentId}){

/* ── AdminModal ── */
function AdminModal({members,setMembers,teamColors,setTeamColors,tasks,update,showToast,onClose,projects,setProjects,currentProjectId,switchProject}){
  const [tab,setTab]=useState('members');
  const [confirm,setConfirm]=useState(null);
  const [newMemberName,setNewMemberName]=useState('');
  const [newMemberTeam,setNewMemberTeam]=useState(Object.keys(members)[0]||'');
  const [editingMember,setEditingMember]=useState(null);
  const [editName,setEditName]=useState('');
  const [newTeamName,setNewTeamName]=useState('');
  const [newTeamColor,setNewTeamColor]=useState('#9b59b6');
  const teams=Object.keys(members);

  function addMember(){
    if(!newMemberName.trim()||!newMemberTeam)return;
    const name=newMemberName.trim();
    if(Object.values(members).flat().includes(name)){showToast('Member already exists!');return}
    setMembers(prev=>{const next={...prev};next[newMemberTeam]=[...(next[newMemberTeam]||[]),name];return next});
    setNewMemberName('');showToast(`Added ${name} to ${newMemberTeam}`);
  }

  function saveMemberEdit(team,oldName){
    if(!editName.trim())return;
    const name=editName.trim();
    setMembers(prev=>{const next={...prev};next[team]=next[team].map(m=>m===oldName?name:m);return next});
    update(t=>{getAllTasks(t).forEach(task=>{if(task.assignee===oldName)task.assignee=name})});
    setEditingMember(null);showToast(`Renamed ${oldName} -> ${name}`);
  }

  function changeMemberTeam(oldTeam,memberName,newTeam){
    if(oldTeam===newTeam)return;
    setMembers(prev=>{const next={...prev};next[oldTeam]=next[oldTeam].filter(m=>m!==memberName);next[newTeam]=[...(next[newTeam]||[]),memberName];return next});
    update(t=>{getAllTasks(t).forEach(task=>{if(task.assignee===memberName)task.team=newTeam})});
    showToast(`Moved ${memberName} -> ${newTeam}`);
  }

  function deleteMember(team,name){
    const taskCount=getAllTasks(tasks).filter(t=>t.assignee===name).length;
    if(taskCount>0){
      setConfirm({title:`Xóa member "${name}"?`,message:`Member này đang được assign cho ${taskCount} task(s). Các task đó sẽ bỏ trống assignee.`,
        action:()=>{
          setMembers(prev=>{const next={...prev};next[team]=next[team].filter(m=>m!==name);return next});
          update(t=>{getAllTasks(t).forEach(task=>{if(task.assignee===name)task.assignee=''})});
          setConfirm(null);showToast(`Deleted member ${name}`);
        }
      });
    } else {
      setMembers(prev=>{const next={...prev};next[team]=next[team].filter(m=>m!==name);return next});
      showToast(`Deleted member ${name}`);
    }
  }

  function addTeam(){
    if(!newTeamName.trim())return;
    const name=newTeamName.trim();
    if(members[name]){showToast('Team already exists!');return}
    setMembers(prev=>({...prev,[name]:[]}));
    setTeamColors(prev=>({...prev,[name]:newTeamColor}));
    setNewTeamName('');showToast(`Added team ${name}`);
  }

  function deleteTeam(teamName){
    const teamMembers=members[teamName]||[];
    const taskCount=getAllTasks(tasks).filter(t=>t.team===teamName).length;
    setConfirm({title:`Xóa team "${teamName}"?`,message:`Team có ${teamMembers.length} member(s) và ${taskCount} task(s).`,
      action:()=>{
        setMembers(prev=>{const next={...prev};delete next[teamName];return next});
        setTeamColors(prev=>{const next={...prev};delete next[teamName];return next});
        if(taskCount>0)update(t=>{getAllTasks(t).forEach(task=>{if(task.team===teamName){task.team='';task.assignee=''}})});
        setConfirm(null);showToast(`Deleted team ${teamName}`);
      }
    });
  }

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal wide" onClick={e=>e.stopPropagation()}>
        <h3>Admin - Quản lý</h3>
        <div className="admin-tabs">
          <div className={`admin-tab ${tab==='members'?'active':''}`} onClick={()=>setTab('members')}>Members</div>
          <div className={`admin-tab ${tab==='teams'?'active':''}`} onClick={()=>setTab('teams')}>Teams</div>
          <div className={`admin-tab ${tab==='projects'?'active':''}`} onClick={()=>setTab('projects')}>Dự án</div>
        </div>

        {tab==='members'&&(
          <div>
            <div style={{display:'flex',gap:8,marginBottom:12,alignItems:'flex-end'}}>
              <div className="field" style={{flex:1,margin:0}}>
                <label>Tên Member</label>
                <input value={newMemberName} onChange={e=>setNewMemberName(e.target.value)} placeholder="VD: NguyenVA" onKeyDown={e=>e.key==='Enter'&&addMember()}/>
              </div>
              <div className="field" style={{width:140,margin:0}}>
                <label>Team</label>
                <select value={newMemberTeam} onChange={e=>setNewMemberTeam(e.target.value)}>
                  {teams.map(t=><option key={t}>{t}</option>)}
                </select>
              </div>
              <button className="btn btn-primary btn-sm" onClick={addMember} style={{height:30}}>+ Thêm</button>
            </div>
            <div style={{maxHeight:350,overflow:'auto'}}>
              {teams.map(team=>(
                <div key={team} style={{marginBottom:12}}>
                  <div style={{fontSize:12,fontWeight:700,color:teamColors[team]||'var(--text)',marginBottom:4,display:'flex',alignItems:'center',gap:6}}>
                    <span style={{display:'inline-block',width:10,height:10,borderRadius:'50%',background:teamColors[team]||'#666'}}></span>
                    {team} ({(members[team]||[]).length})
                  </div>
                  <table className="admin-table">
                    <tbody>
                    {(members[team]||[]).map(m=>(
                      <tr key={m}>
                        <td style={{width:'40%'}}>
                          {editingMember===`${team}:${m}`?(
                            <input value={editName} onChange={e=>setEditName(e.target.value)} autoFocus
                              onKeyDown={e=>{if(e.key==='Enter')saveMemberEdit(team,m);if(e.key==='Escape')setEditingMember(null)}}
                              onBlur={()=>saveMemberEdit(team,m)}/>

                        </td>
                        <td style={{width:'20%'}}>
                          <select value={team} onChange={e=>changeMemberTeam(team,m,e.target.value)} style={{fontSize:11,padding:'2px 4px'}}>
                            {teams.map(t=><option key={t}>{t}</option>)}
                          </select>
                        </td>
                        <td style={{width:'15%',fontSize:10,color:'var(--text2)'}}>

                        <td style={{width:'25%',textAlign:'right'}}>
                          <button className="btn btn-ghost btn-sm" style={{padding:'2px 6px',display:'inline-flex'}}

                          <button className="btn btn-ghost btn-sm" style={{padding:'2px 6px',display:'inline-flex',color:'var(--red)'}}

                        </td>

                    )}

        {tab==='teams'&&(

            <div style={{display:'flex',gap:8,marginBottom:12,alignItems:'flex-end'}}>
              <div className="field" style={{flex:1,margin:0}}>

                <input value={newTeamName} onChange={e=>setNewTeamName(e.target.value)} placeholder="VD: Marketing" onKeyDown={e=>e.key==='Enter'&&addTeam()}/>
              </div>
              <div className="field" style={{width:80,margin:0}}>
                <label>Mau</label>
                <input type="color" value={newTeamColor} onChange={e=>setNewTeamColor(e.target.value)} style={{height:30,padding:2}}/>

              <button className="btn btn-primary btn-sm" onClick={addTeam} style={{height:30}}>+ Thêm Team</button>

            <table className="admin-table">
              <thead><tr><th>Team</th><th>Members</th><th>Tasks</th><th>Mau</th><th></th></tr></thead>
              <tbody>
              {teams.map(team=>{
                const memberCount=(members[team]||[]).length;
                const taskCount=getAllTasks(tasks).filter(t=>t.team===team).length;
                return(

                    <td style={{fontWeight:600}}><span style={{display:'inline-block',width:10,height:10,borderRadius:'50%',background:teamColors[team]||'#666',marginRight:6}}></span>{team}</td>

        </div>

            <p>{confirm.message}</p>
            <div className="actions">
              <button className="btn btn-ghost" onClick={()=>setConfirm(null)}>Hủy</button>

/* ── ProjectsTab (inside AdminModal) ── */
function ProjectsTab({projects,setProjects,currentProjectId,switchProject,showToast,confirm,setConfirm}){
  const [newProjectName,setNewProjectName]=useState('');
  const [editingProject,setEditingProject]=useState(null);
  const [editProjectName,setEditProjectName]=useState('');

  async function addProject(){
    if(!newProjectName.trim())return;
    try{
      const res=await apiCall('POST','/api/projects',{name:newProjectName.trim()});
      setProjects(prev=>[...prev,res]);
      setNewProjectName('');
      showToast(`Tạo dự án "${res.name}" thành công`);
    }catch(e){showToast('Lỗi tạo dự án: '+e.message)}
  }

  async function saveProjectEdit(id){
    if(!editProjectName.trim())return;
    try{
      const res=await apiCall('PUT',`/api/projects/${id}`,{name:editProjectName.trim()});
      setProjects(prev=>prev.map(p=>p.id===id?{...p,name:res.name}:p));
      setEditingProject(null);
      showToast('Đã cập nhật tên dự án');
    }catch(e){showToast('Lỗi sửa dự án: '+e.message)}
  }

  async function setDefaultProject(id){
    try{
      await apiCall('PUT',`/api/projects/${id}`,{is_default:true});
      setProjects(prev=>prev.map(p=>({...p,is_default:p.id===id})));
      showToast('Đã đặt dự án mặc định');
    }catch(e){showToast('Loi: '+e.message)}
  }

  function deleteProject(id,name){
    if(id===currentProjectId&&projects.length<=1){showToast('Không thể xóa dự án duy nhất!');return}
    setConfirm({
      title:`Xóa dự án "${name}"?`,
      message:'Tất cả tasks trong dự án này sẽ bị xóa vĩnh viễn. Hành động không thể hoàn tác!',
      action:async()=>{
        try{
          await apiCall('DELETE',`/api/projects/${id}`);
          const updated=projects.filter(p=>p.id!==id);
          setProjects(updated);
          if(id===currentProjectId&&updated.length>0){
            const next=updated.find(p=>p.is_default)||updated[0];
            switchProject(next.id);
          }
          setConfirm(null);
          showToast(`Đã xóa dự án "${name}"`);
        }catch(e){showToast('Lỗi xóa dự án: '+e.message);setConfirm(null)}
      }
    });
  }

  return(
    <div>
      <div style={{display:'flex',gap:8,marginBottom:12,alignItems:'flex-end'}}>
        <div className="field" style={{flex:1,margin:0}}>
          <label>Tên dự án mới</label>
          <input value={newProjectName} onChange={e=>setNewProjectName(e.target.value)} placeholder="VD: Side Project" onKeyDown={e=>e.key==='Enter'&&addProject()}/>
        </div>
        <button className="btn btn-primary btn-sm" onClick={addProject} style={{height:30}}>+ Tạo</button>
      </div>
      <table className="admin-table">
        <thead><tr><th>Dự án</th><th style={{width:70,textAlign:'center'}}>Mặc định</th><th style={{width:120,textAlign:'right'}}></th></tr></thead>
        <tbody>
        {projects.map(p=>(
          <tr key={p.id} style={{background:p.id===currentProjectId?'rgba(59,130,246,.1)':''}}>
            <td style={{fontWeight:600}}>
              {editingProject===p.id?(
                <input value={editProjectName} onChange={e=>setEditProjectName(e.target.value)} autoFocus
                  onKeyDown={e=>{if(e.key==='Enter')saveProjectEdit(p.id);if(e.key==='Escape')setEditingProject(null)}}
                  onBlur={()=>saveProjectEdit(p.id)}/>
              ):p.name}
              {p.id===currentProjectId&&<span style={{fontSize:9,color:'var(--primary)',marginLeft:6}}>(đang xem)</span>}
            </td>
            <td style={{textAlign:'center'}}>
              <input type="radio" name="defaultProject" checked={p.is_default} onChange={()=>setDefaultProject(p.id)} style={{cursor:'pointer'}}/>
            </td>
            <td style={{textAlign:'right',whiteSpace:'nowrap'}}>
              <button className="btn btn-ghost btn-sm" style={{padding:'2px 6px',display:'inline-flex'}}
                onClick={()=>{setEditingProject(p.id);setEditProjectName(p.name)}}>Sửa</button>
              <button className="btn btn-ghost btn-sm" style={{padding:'2px 6px',display:'inline-flex',color:'var(--red)'}}
                onClick={()=>deleteProject(p.id,p.name)}>Xóa</button>
            </td>
          </tr>
        ))}
        </tbody>
      </table>
    </div>
  );
}

/* ── Import/Export helpers ── */
function detectHeaders(headers){
  const find=keywords=>{for(const h of headers){const l=String(h).toLowerCase().trim();if(keywords.some(k=>l===k||l.includes(k)))return h}return null};
  return{id:find(['id']),wbs:find(['wbs']),phase:find(['phase','epic']),task:find(['task','summary','task name','name']),type:find(['type']),team:find(['team','label']),assignee:find(['assignee','assigned']),priority:find(['priority','pri']),status:find(['status','state']),start:find(['start date','start','begin']),end:find(['end date','end','due date','due']),pct:find(['% complete','complete','progress','pct']),deps:find(['dependencies','deps','depends']),notes:find(['notes','description','comment'])};
}
function normalizeDate(val){
  if(!val)return'';const str=String(val).trim();
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(str))return str;
  if(typeof val==='number'||/^\d{5}$/.test(str)){const num=typeof val==='number'?val:parseInt(str);const dt=new Date((num-25569)*86400000);return fmt(dt)}
  const iso=str.match(/^(\d{4})-(\d{2})-(\d{2})/);if(iso)return`${iso[3]}/${iso[2]}/${iso[1]}`;
  const dt2=new Date(str);if(!isNaN(dt2.getTime()))return fmt(dt2);
  return'';
}
function normalizePct(val){if(val===null||val===undefined||val==='')return 0;const num=typeof val==='number'?val:parseFloat(String(val).replace('%',''));if(isNaN(num))return 0;if(num>0&&num<=1)return Math.round(num*100);return Math.max(0,Math.min(100,Math.round(num)))}
function normalizePriority(val){const s=String(val).toLowerCase().trim();if(s.includes('high')||s==='h')return'High';if(s.includes('low')||s==='l')return'Low';return'Normal'}
function normalizeStatus(val){const s=String(val).toLowerCase().trim();if(s.includes('progress')||s.includes('doing'))return'In Progress';if(s.includes('done')||s.includes('complete'))return'Completed';if(s.includes('block')||s.includes('hold'))return'On Hold';return'Not Started'}

/* ── T094: Render @mentions as highlighted spans ── */
function renderMentions(text,membersList){
  if(!text)return '';
  const names=new Set(membersList.map(m=>m.name));
  // Escape HTML
  const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const escaped=esc(text);
  // Replace @MemberName with spans, then convert \n to <br/>
  const html=escaped.replace(/@(\w+)/g,(match,name)=>{
    if(names.has(name))return `<span class="mention">@${name}</span>`;
    return match;
  });
  return html.replace(/\n/g,'<br/>');
}

/* ── T092-T093: MentionTextarea component ── */
function MentionTextarea({value,onChange,members,placeholder,style}){
  const [mentionQuery,setMentionQuery]=useState(null);
  const [activeIdx,setActiveIdx]=useState(0);
  const [mentionStart,setMentionStart]=useState(-1);
  const textareaRef=useRef(null);

  const filtered=useMemo(()=>{
    if(mentionQuery===null||mentionQuery==='')return members||[];
    const q=mentionQuery.toLowerCase();
    return (members||[]).filter(m=>m.name.toLowerCase().startsWith(q));
  },[mentionQuery,members]);

  function handleInput(e){
    const val=e.target.value;
    onChange(val);
    const pos=e.target.selectionStart;
    // Scan backward from cursor to find @
    let atPos=-1;
    for(let i=pos-1;i>=0;i--){
      if(val[i]==='@'){
        // @ must be at start or preceded by whitespace/newline
        if(i===0||/[\s\n]/.test(val[i-1])){atPos=i;break}
        else break;
      }
      if(/[\s\n]/.test(val[i]))break;
    }
    if(atPos>=0){
      const query=val.slice(atPos+1,pos);
      setMentionQuery(query);
      setMentionStart(atPos);
      setActiveIdx(0);
    }else{
      setMentionQuery(null);
      setMentionStart(-1);
    }
  }

  function selectMember(member){
    const ta=textareaRef.current;
    if(!ta)return;
    const val=value||'';
    const pos=ta.selectionStart;
    const before=val.slice(0,mentionStart);
    const after=val.slice(pos);
    const newVal=before+'@'+member.name+' '+after;
    onChange(newVal);
    setMentionQuery(null);
    setMentionStart(-1);
    // Set cursor after inserted mention
    setTimeout(()=>{
      const newPos=mentionStart+member.name.length+2;
      ta.focus();
      ta.setSelectionRange(newPos,newPos);
    },0);
  }

  function handleKeyDown(e){
    if(mentionQuery===null||filtered.length===0)return;
    if(e.key==='ArrowDown'){e.preventDefault();setActiveIdx(i=>(i+1)%filtered.length)}
    else if(e.key==='ArrowUp'){e.preventDefault();setActiveIdx(i=>(i-1+filtered.length)%filtered.length)}
    else if(e.key==='Enter'&&filtered.length>0){e.preventDefault();selectMember(filtered[activeIdx])}
    else if(e.key==='Escape'){setMentionQuery(null);setMentionStart(-1)}
  }

  return(
    <div className="mention-container">
      {mentionQuery!==null&&filtered.length>0&&(
        <div className="mention-dropdown">
          {filtered.slice(0,8).map((m,i)=>(
            <div key={m.name} className={`mention-dropdown-item ${i===activeIdx?'active':''}`}
              onMouseDown={e=>{e.preventDefault();selectMember(m)}}
              onMouseEnter={()=>setActiveIdx(i)}>
              <span style={{fontWeight:600}}>{m.name}</span>
              <span className="team-label">{m.team}</span>
            </div>
          ))}
        </div>
      )}
      <textarea ref={textareaRef} value={value||''} onChange={handleInput} onKeyDown={handleKeyDown}
        placeholder={placeholder} style={style}/>
    </div>
  );
}

      // Remove from current position
      const task=siblings.splice(index,1)[0];
      // Add as child of previous sibling
      if(!prevSibling.children)prevSibling.children=[];

      const{task,parent,siblings,index}=info;
      // Find parent's position in grandparent
      const grandInfo=findTaskWithParent(t,parent.id,null);
      if(!grandInfo)return;
      // Remove from parent
      siblings.splice(index,1);
      // Move siblings after this task to become children of the outdented task
      const afterSiblings=siblings.splice(index);
      if(afterSiblings.length>0){
        if(!task.children)task.children=[];
        task.children.push(...afterSiblings);
        if(task.expanded===undefined)task.expanded=true;
      }
      // Insert after parent in grandparent's children

      grandInfo.siblings.splice(parentIdx+1,0,task);

  function isDescendant(task,targetId){

      if(currentParentId===newParentId)return;
      if(newParentId===taskId)return;
      // Check circular: can't move into own descendant
      if(newParentId!=null&&isDescendant(info.task,newParentId))return;
      // Remove from current position
      info.siblings.splice(info.index,1);
      // Insert into new parent
      if(newParentId==null){
        t.push(info.task);
      }else{
        const target=findTask(t,newParentId);
        if(!target)return;
        if(!target.children)target.children=[];

  function exportJira(){
    const all=flattenAllTasks(tasks);
    function csvF(v){if(v===null||v===undefined)return'""';const s=String(v);return'"'+s.replace(/"/g,'""')+'"'}
    function toIsoDate(dateStr){if(!dateStr)return'';const dt=d(dateStr);return`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`}
    function jiraType(t){
      const depth=t._level||0;
      const hasKids=t.children&&t.children.length>0;
      if(depth===0&&hasKids)return'Epic';
      if(depth===0&&!hasKids)return'Task';
      if(depth===1)return'Story';
      return'Sub-task';
    }
    function findParentId(t){
      if(t._level===0)return'';
      for(let i=all.indexOf(t)-1;i>=0;i--){
        if(all[i]._level===t._level-1)return String(all[i].id);
      }
      return'';
    }
    const headers=['Issue Id','Issue Type','Summary','Parent','Priority','Assignee','Labels','Description','Due date','Original Estimate'];
    let csv=headers.join(',')+'\n';
    all.forEach(t=>{
      const isP=t.children&&t.children.length>0;
      const dueDate=isP?'':toIsoDate(t.end);
      const wd=!isP&&t.start&&t.end?workingDays(d(t.start),d(t.end)):0;
      const estimate=wd>0?String(wd*8*3600):'';
      const depsStr=(t.deps||[]).map(dep=>{const did=typeof dep==='number'?dep:dep.id;return'T'+String(did).padStart(3,'0')}).join(', ');
      let desc=isP?'':(t.notes||'');
      if(!isP&&t.start)desc+=(desc?'\n':'')+'Start: '+t.start;
      if(!isP&&depsStr)desc+='\nDeps: '+depsStr;
      const pri=isP?'':(t.priority==='Normal'?'Medium':t.priority);
      csv+=[csvF(t.id),csvF(jiraType(t)),csvF(t.name),csvF(findParentId(t)),csvF(pri),csvF(isP?'':t.assignee||''),csvF(isP?'':t.team||''),csvF(desc),csvF(dueDate),csvF(estimate)].join(',')+'\n';
    });
    const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});const link=document.createElement('a');link.href=URL.createObjectURL(blob);link.download='Jira_Import_PTB.csv';link.click();URL.revokeObjectURL(link.href);showToast('Exported Jira CSV!');
  }

  function saveData(){

    const json=JSON.stringify(project,null,2);const blob=new Blob([json],{type:'application/json'});
    const link=document.createElement('a');link.href=URL.createObjectURL(blob);link.download='poker_build_plan.json';link.click();showToast('Exported backup file!');
  }

  function normalizeTeam(val){const str=String(val).trim();const teams=Object.keys(members);const exact=teams.find(t=>t.toLowerCase()===str.toLowerCase());if(exact)return exact;const partial=teams.find(t=>str.toLowerCase().includes(t.toLowerCase()));return partial||str}

  function importExcelFile(file){
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=new Uint8Array(ev.target.result);const workbook=XLSX.read(data,{type:'array'});const sheet=workbook.Sheets[workbook.SheetNames[0]];const rows=XLSX.utils.sheet_to_json(sheet,{defval:''});
        if(rows.length===0){showToast('Excel file is empty');return}
        const hm=detectHeaders(Object.keys(rows[0]));if(!hm.task){showToast('Error: Could not find Task/Summary column');return}
        const idMap={};const imported=[];const typeCol=hm.type||null;const wbsCol=hm.wbs||null;
        rows.forEach(row=>{
          const taskName=row[hm.task];if(!taskName||!String(taskName).trim())return;
          const newId=genId();const oldId=row[hm.id]||'';if(oldId)idMap[String(oldId).trim()]=newId;
          const rowType=typeCol?String(row[typeCol]||'').trim().toLowerCase():'';
          const isP=rowType==='parent'||rowType==='summary';
          const t={id:newId,name:String(taskName).trim(),team:isP?'':normalizeTeam(row[hm.team]||''),assignee:isP?'':String(row[hm.assignee]||'').trim(),priority:isP?'':normalizePriority(row[hm.priority]||'Normal'),status:isP?'':normalizeStatus(row[hm.status]||'Not Started'),start:normalizeDate(row[hm.start]||''),end:normalizeDate(row[hm.end]||''),pct:normalizePct(row[hm.pct]),deps:[],notes:String(row[hm.notes]||'').trim(),children:[],_depsRaw:String(row[hm.deps]||'').trim(),_wbsRaw:wbsCol?String(row[wbsCol]||'').trim():''};
          if(isP){t.expanded=true}
          imported.push(t);
        });
        imported.forEach(t=>{
          if(t._depsRaw){
            t.deps=t._depsRaw.split(/[,;]/).map(s=>s.trim()).filter(Boolean).map(s=>{
              const mapped=idMap[s]||null;
              return mapped?{id:mapped,type:'FS',lag:0}:null;
            }).filter(Boolean);
          }
          delete t._depsRaw;
        });
        // Rebuild hierarchy using WBS codes if available
        const wbsMap={};imported.forEach(t=>{if(t._wbsRaw)wbsMap[t._wbsRaw]=t});
        imported.forEach(t=>{
          if(t._wbsRaw&&t._wbsRaw.includes('.')){
            const parts=t._wbsRaw.split('.');parts.pop();const parentWbs=parts.join('.');
            const parent=wbsMap[parentWbs];
            if(parent){parent.children.push(t);t._nested=true}
          }
          delete t._wbsRaw;
        });
        const topLevel=imported.filter(t=>!t._nested);topLevel.forEach(t=>delete t._nested);
        imported.filter(t=>t._nested).forEach(t=>{delete t._nested});
        if(!confirm(`Import ${imported.length} tasks from Excel?\nSẽ thay thế toàn bộ tasks hiện tại.`))return;
        initNextId(topLevel);autoSchedule(topLevel);setTasks(topLevel);
        showToast(`Imported ${imported.length} tasks from Excel!`);
      }catch(err){console.error(err);showToast('Error reading Excel: '+err.message)}
    };
    reader.readAsArrayBuffer(file);
  }

      const ext=file.name.split('.').pop().toLowerCase();
      if(ext==='json'){
        const reader=new FileReader();
        reader.onload=ev=>{
          try{
            const data=JSON.parse(ev.target.result);
            if(Array.isArray(data)){initNextId(data);autoSchedule(data);setTasks(data)}
            else{if(data.tasks){initNextId(data.tasks);autoSchedule(data.tasks);setTasks(data.tasks)}if(data.members)setMembers(data.members);if(data.teamColors)setTeamColors(data.teamColors)}
            showToast('Loaded from JSON!');
          }catch(err){showToast('Error: invalid JSON file')}
        };
        reader.readAsText(file);
      }else if(ext==='xlsx'||ext==='xls'){importExcelFile(file)}
      else{showToast('Unsupported file type. Use .json or .xlsx')}
    };
    input.click();
  }

                      style={{left:bar.left,width:bar.width,background:bar.bg,height:bar.height||22,top:bar.top||5,boxShadow:isCritical?'0 0 0 2px var(--red)':'none',
                        ...(bar.type==='parent'?{borderLeft:'4px solid #1e293b',borderRight:'4px solid #1e293b',borderRadius:0}:{})}}
                      onClick={()=>{setSelectedId(t.id);setShowDetail(true)}}
                      title={`${t.name}\n${t.start||''} -> ${t.end||''}`}>
                      {bar.type==='parent'&&<div className="gantt-bar-progress" style={{width:`${bar.pct}%`,background:'#333'}}></div>}
                      {bar.type==='task'&&<div className="gantt-bar-progress" style={{width:`${t.pct||0}%`}}></div>}
                      {bar.type==='task'&&<span className="bar-label">{t.name}</span>}
                      {bar.type==='parent'&&<span className="bar-label" style={{fontWeight:700,fontSize:9}}>{t.name}</span>}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      </div>
      ):(
      /* Board View */
      <div className="board-view" style={{flex:1,display:'flex',gap:12,padding:12,overflow:'auto'}}>
        {STATUSES.map(status=>{
          const statusTasks=allFlat.filter(t=>!isParent(t)&&t.status===status);
          const filtered=statusTasks.filter(t=>{
            const matchTeam=filterTeam==='All'||t.team===filterTeam;
            const q=search.toLowerCase();const matchSearch=!search||t.name.toLowerCase().includes(q)||(t.assignee&&t.assignee.toLowerCase().includes(q));
            return matchTeam&&matchSearch;
          });
          return(
            <div key={status} className="board-column" style={{flex:1,minWidth:180,background:'var(--surface)',borderRadius:8,display:'flex',flexDirection:'column',overflow:'hidden'}}>
              <div style={{padding:'10px 12px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontWeight:700,fontSize:13}}>{status}</span>
                <span style={{fontSize:11,color:'var(--text2)',background:'var(--surface2)',padding:'2px 8px',borderRadius:10}}>{filtered.length}</span>
              </div>
              <div style={{flex:1,overflow:'auto',padding:8,display:'flex',flexDirection:'column',gap:6}}>
                {filtered.map(t=>(
                  <div key={t.id} style={{background:'var(--surface2)',borderRadius:6,padding:10,cursor:'pointer',borderLeft:`3px solid ${TEAM_COLORS[t.team]||'#666'}`}}
                    onClick={()=>{setSelectedId(t.id);setShowDetail(true)}}>
                    <div style={{fontSize:12,fontWeight:600,marginBottom:4}}>{t.name}</div>
                    <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
                      <span className="team-badge" style={{background:TEAM_COLORS[t.team]||'#666'}}>{t.team}</span>
                      <span style={{fontSize:10,color:'var(--text2)'}}>{t.assignee}</span>
                      <span style={{fontSize:10,color:t.priority==='High'?'var(--red)':t.priority==='Normal'?'var(--yellow)':'var(--green)',marginLeft:'auto',fontWeight:600}}>{t.priority}</span>
                    </div>
                    {t.pct>0&&<div style={{marginTop:6,height:3,background:'var(--border)',borderRadius:2}}><div style={{height:'100%',width:`${t.pct}%`,background:'var(--primary)',borderRadius:2}}></div></div>}
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>
      )}

      {/* Detail Panel */}
      <div className={`detail-overlay ${showDetail&&editBuffer?'open':''}`}>
        {editBuffer&&(()=>{
          const eb=editBuffer;
          const isP=isParent(eb);
          const dur=eb.start&&eb.end?workingDays(d(eb.start),d(eb.end)):0;
          const setB=(field,val)=>setEditBuffer(prev=>({...prev,[field]:val}));
          // Find current parent
          const ebInfo=findTaskWithParent(tasks,eb.id,null);
          const currentParentId=ebInfo&&ebInfo.parent?ebInfo.parent.id:null;
          // Available parents: all tasks except self and descendants
          const availableParents=allFlatWithLevel.filter(t=>t.id!==eb.id&&!isDescendant(eb,t.id));
          return(
          <>
            <button className="close-btn" onClick={()=>setShowDetail(false)}>✕</button>
            <h3>{isP&&<span style={{fontSize:11,background:'#475569',color:'#fff',padding:'2px 6px',borderRadius:3,marginRight:8}}>Parent</span>}{eb.name}</h3>
            <div className="field">
              <label>Task Name</label>
              <input value={eb.name} onChange={e=>setB('name',e.target.value)}/>
            </div>
            {/* Parent selector — WBS input */}
            <ParentSelector currentParentId={currentParentId} availableParents={availableParents} rootTasks={tasks} onMove={newPid=>moveTask(eb.id,newPid)} currentTaskId={eb.id}/>
            {/* Action buttons — all tasks */}
            <div style={{display:'flex',gap:8,marginBottom:8,flexWrap:'wrap'}}>
              <button className="btn btn-primary btn-sm" onClick={()=>{
                setAddParentId(eb.id);setShowAdd(true);
              }}>+ Thêm task con</button>
              <button className="btn btn-ghost btn-sm" onClick={()=>indentTask(eb.id)} title="Indent (make child of previous sibling)">→ Indent</button>
              <button className="btn btn-ghost btn-sm" onClick={()=>outdentTask(eb.id)} title="Outdent (move up one level)">← Outdent</button>
            </div>
            {isP?(
              <>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                  <div className="field"><label>Start (tự động)</label>
                    <input value={eb.start||''} disabled style={{opacity:0.6}}/>
                  </div>
                  <div className="field"><label>End (tự động)</label>
                    <input value={eb.end||''} disabled style={{opacity:0.6}}/>
                  </div>
                  <div className="field"><label>Duration</label>
                    <input value={dur+'d'} disabled style={{opacity:0.6}}/>
                  </div>
                  <div className="field"><label>Progress (tự động)</label>
                    <input value={(eb.pct||0)+'%'} disabled style={{opacity:0.6}}/>
                  </div>
                </div>
                <div style={{fontSize:11,color:'var(--text2)',padding:'8px 0',fontStyle:'italic'}}>
                  Start/End/Progress tự động tính từ {(eb.children||[]).length} task con
                </div>
              </>
            ):(
              <>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                  <div className="field"><label>Team</label>
                    <select value={eb.team} onChange={e=>setB('team',e.target.value)}>
                      {TEAMS.map(t=><option key={t}>{t}</option>)}
                    </select>
                  </div>
                  <div className="field"><label>Assignee</label>
                    <select value={eb.assignee} onChange={e=>setB('assignee',e.target.value)}>
                      {ALL_MEMBERS.map(m=><option key={m}>{m}</option>)}
                    </select>
                  </div>
                  <div className="field"><label>Priority</label>
                    <select value={eb.priority} onChange={e=>setB('priority',e.target.value)}>
                      {PRIORITIES.map(p=><option key={p}>{p}</option>)}
                    </select>
                  </div>
                  <div className="field"><label>Status</label>
                    <select value={eb.status} onChange={e=>{setB('status',e.target.value);if(e.target.value==='Completed')setB('pct',100)}}>
                      {STATUSES.map(s=><option key={s}>{s}</option>)}
                    </select>
                  </div>
                  <div className="field"><label>Duration (working days)</label>
                    <input type="number" min="0" value={dur} onChange={e=>{const days=Math.max(0,parseInt(e.target.value)||0);if(eb.start){const newEnd=addWorkingDays(d(eb.start),days);setB('end',fmt(newEnd))}}}/>
                  </div>
                  <div className="field"><label>Start Date</label>
                    <DatePicker value={eb.start} onChange={v=>setB('start',v)}
                      onWeekendSkip={()=>showToast('Ngày rơi vào T7/CN, đã chuyển sang Thứ 2!')}/>
                  </div>
                  <div className="field"><label>End Date</label>
                    <DatePicker value={eb.end} onChange={v=>setB('end',v)}
                      onWeekendSkip={()=>showToast('Ngày rơi vào T7/CN, đã chuyển sang Thứ 2!')}/>
                  </div>
                </div>
                <div className="field">
                  <label>Progress: {eb.pct}%</label>
                  <input type="range" min="0" max="100" step="10" value={eb.pct}
                    onChange={e=>setB('pct',+e.target.value)}
                    style={{width:'100%',accentColor:'var(--primary)'}}/>
                </div>
              </>
            )}
            <DepsSelector deps={eb.deps||[]} onChange={newDeps=>setB('deps',newDeps)} allTasks={allFlat} currentTaskId={eb.id} rootTasks={tasks}
              onDepsAutoDate={isP?undefined:newDeps=>{
                if(!newDeps||newDeps.length===0)return;
                let maxEnd=null;
                newDeps.forEach(dep=>{const id=typeof dep==='number'?dep:dep.id;const t=allFlat.find(x=>x.id===id);if(t&&t.end){const e=d(t.end);if(!maxEnd||e>maxEnd)maxEnd=e}});
                if(maxEnd){
                  const curDur=workingDays(d(eb.start),d(eb.end));
                  const ns=skipWeekend(addDays(maxEnd,1)).date;
                  setEditBuffer(prev=>({...prev,start:fmt(ns),end:fmt(addWorkingDays(ns,curDur))}));
                }
              }}/>
            <div className="field">
              <label>Notes</label>
              <textarea value={eb.notes||''} onChange={e=>setB('notes',e.target.value)}/>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:12,marginTop:14}}>
              <button className={`btn-update ${updating?'saving':''}`} onClick={handleUpdate}>
                {updating?<span className="saving-dots"><span>.</span><span>.</span><span>.</span></span>:'Update'}
              </button>
              <button className="delete-link" onClick={()=>{
                if(window.confirm(`Xác nhận xóa task "${eb.name}"?${isP?'\nTất cả task con sẽ bị xóa!':'\nHành động này không thể hoàn tác!'}`))deleteTask(eb.id);
              }}>Delete Task</button>
            </div>
          </>
          );
        })()}
      </div>

      {/* Add Task Modal */}
      {showAdd&&<AddTaskModal tasks={tasks} teams={TEAMS} members={members} teamColors={TEAM_COLORS} onAdd={addTask} onClose={()=>setShowAdd(false)} showToast={showToast} parentId={addParentId}/>}

      {/* Admin Modal */}
      {showAdmin&&<AdminModal members={members} setMembers={setMembers} teamColors={teamColors} setTeamColors={setTeamColors} tasks={tasks} update={update} showToast={showToast} onClose={()=>setShowAdmin(false)} projects={projects} setProjects={setProjects} currentProjectId={currentProjectId} switchProject={switchProject}/>}

      {/* Toast */}
      {toast&&<div className="toast">{toast}</div>}

      {/* Build Version Footer */}
      <div style={{position:'fixed',bottom:0,left:0,right:0,textAlign:'center',padding:'2px 0',fontSize:10,color:'#999',background:'rgba(255,255,255,0.9)',borderTop:'1px solid #eee',zIndex:1}}>{BUILD_VERSION} | {BUILD_TIME}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
