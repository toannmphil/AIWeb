<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poker Texas Build Plan</title>
<style>
/* ═══════════════════════════════════════ */
/* THEME & VARIABLES                       */
/* ═══════════════════════════════════════ */
:root {
  --bg: #0f172a;
  --surface: #1e293b;
  --surface2: #334155;
  --border: #475569;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --primary: #3b82f6;
  --primary-hover: #2563eb;
  --green: #22c55e;
  --yellow: #eab308;
  --red: #ef4444;
  --orange: #f97316;
  --purple: #a855f7;
  --cyan: #06b6d4;
  --pink: #ec4899;
  --spacing-xs: 4px;
  --spacing-sm: 8px;
  --spacing-md: 16px;
  --spacing-lg: 24px;
  --radius-sm: 4px;
  --radius-md: 8px;
  --font-size-xs: 11px;
  --font-size-sm: 12px;
  --font-size-md: 14px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: var(--font-size-md);
  overflow: hidden;
  height: 100vh;
}

/* ═══════════════════════════════════════ */
/* LAYOUT                                  */
/* ═══════════════════════════════════════ */
.app { display: flex; flex-direction: column; height: 100vh; }
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--spacing-sm) var(--spacing-md);
  background: var(--surface); border-bottom: 1px solid var(--border);
  min-height: 48px;
}
.header-title { font-size: 16px; font-weight: 700; color: var(--primary); }
.header-actions { display: flex; align-items: center; gap: var(--spacing-sm); }
.header-user { color: var(--text2); font-size: var(--font-size-sm); }
.toolbar {
  display: flex; align-items: center; gap: var(--spacing-sm);
  padding: var(--spacing-xs) var(--spacing-md);
  background: var(--surface); border-bottom: 1px solid var(--border);
}
.main { display: flex; flex: 1; overflow: hidden; }
.btn {
  padding: 6px 14px; border: none; border-radius: 6px;
  cursor: pointer; font-size: var(--font-size-sm); font-weight: 600; color: var(--text);
  background: var(--surface2); transition: all 0.15s; display: flex; align-items: center; gap: 5px;
}
.btn:hover { background: var(--primary); }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-success { background: var(--green); color: #fff; }
.btn-success:hover { opacity: 0.9; }
.btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--surface2); }
.btn-danger { background: var(--red); color: #fff; }
.btn-danger:hover { opacity: 0.9; }
.btn-sm { padding: 4px 10px; font-size: var(--font-size-xs); }
.btn-icon { background: none; padding: 4px 6px; }
.btn-icon:hover { background: var(--surface2); }
.view-tabs { display: flex; gap: 2px; }
.view-tab {
  padding: 5px 12px; border-radius: 4px; border: none;
  cursor: pointer; font-size: 11px; font-weight: 600; color: var(--text2); background: transparent;
  transition: all .15s;
}
.view-tab.active { background: var(--primary); color: #fff; }
.view-tab:hover:not(.active) { background: var(--surface2); }
input, select, textarea {
  background: var(--bg); border: 1px solid var(--border); color: var(--text);
  padding: 6px 8px; border-radius: var(--radius-sm); font-size: var(--font-size-sm);
  outline: none;
}
input:focus, select:focus, textarea:focus { border-color: var(--primary); }
select { cursor: pointer; }
.login-screen {
  display: flex; align-items: center; justify-content: center;
  height: 100vh; background: var(--bg);
}
.login-box {
  background: var(--surface); border-radius: var(--radius-md);
  padding: 40px; width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.login-box h2 { text-align: center; margin-bottom: 24px; color: var(--primary); }
.login-box .login-field { margin-bottom: 16px; }
.login-box .login-field label { display: block; margin-bottom: 4px; color: var(--text2); font-size: var(--font-size-sm); }
.login-box .login-field input { width: 100%; padding: 10px; }
.login-box .login-btn { width: 100%; padding: 10px; margin-top: 8px; font-size: 15px; }
.login-error { color: var(--red); font-size: var(--font-size-sm); text-align: center; margin-top: 12px; }

/* ═══════════════════════════════════════ */
/* TASK PANEL                              */
/* ═══════════════════════════════════════ */
.task-panel {
  width: 480px; min-width: 400px; border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden;
}
.task-panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  font-size: 13px; font-weight: 700;
}
.task-list { flex: 1; overflow-y: auto; overflow-x: hidden; }
.task-list::-webkit-scrollbar { width: 6px; }
.task-list::-webkit-scrollbar-track { background: var(--surface); }
.task-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.task-col-header {
  display: flex; align-items: center; padding: 0 8px; height: 28px;
  border-bottom: 1px solid var(--border); background: var(--surface);
  font-size: 10px; font-weight: 600; color: var(--text2); text-transform: uppercase;
}
.task-col-header .col-id { width: 44px; flex-shrink: 0; }
.task-col-header .col-name { flex: 1; min-width: 0; padding-left: 28px; }
.task-col-header .col-assignee { width: 70px; flex-shrink: 0; text-align: center; }
.task-col-header .col-start { width: 44px; flex-shrink: 0; text-align: center; }
.task-col-header .col-dur { width: 28px; flex-shrink: 0; text-align: center; }
.task-col-header .col-end { width: 44px; flex-shrink: 0; text-align: center; }
.task-col-header .col-pct { width: 44px; flex-shrink: 0; text-align: right; }
.task-row {
  display: flex; align-items: center;
  padding: 0 8px; height: 32px; border-bottom: 1px solid rgba(71,85,105,.3);
  cursor: pointer; font-size: var(--font-size-sm);
  transition: background 0.1s;
}
.task-row:hover { background: rgba(59,130,246,.08); }
.task-row.selected { background: rgba(59,130,246,.15); }
.task-row.epic {
  background: rgba(59,130,246,.05); font-weight: 700;
  padding: 0 8px;
}
.task-row .expand-btn {
  width: 18px; height: 18px; display: flex; align-items: center; justify-content: center;
  background: none; border: none; color: var(--text2); cursor: pointer; font-size: 10px;
  flex-shrink: 0; border-radius: 3px; transition: all .15s;
}
.task-row .expand-btn:hover { background: var(--surface2); }
.task-row .epic-name { flex: 1; font-size: 13px; padding-left: 4px; }
.task-row .epic-count { font-size: 11px; color: var(--text2); font-weight: 600; flex-shrink: 0; }
.task-row .task-id { width: 44px; flex-shrink: 0; font-size: 10px; color: var(--text2); font-variant-numeric: tabular-nums; }
.task-row .task-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; padding: 0 6px; }
.task-row .task-assignee { width: 70px; flex-shrink: 0; font-size: 11px; color: var(--primary); text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.task-row .task-date { font-size: 10px; color: var(--text2); width: 44px; text-align: center; flex-shrink: 0; font-variant-numeric: tabular-nums; }
.task-row .task-dur { font-size: 10px; color: var(--text2); width: 28px; text-align: center; flex-shrink: 0; }
.task-row .task-status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin: 0 4px; }
.task-row .pct { font-size: 10px; color: var(--text2); width: 36px; text-align: right; flex-shrink: 0; }
.team-badge {
  padding: 1px 5px; border-radius: 3px; font-size: 9px;
  color: #fff; font-weight: 600; white-space: nowrap; flex-shrink: 0; margin-right: 4px; letter-spacing: .3px;
}
.priority-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-right: 4px;
}
.status-badge {
  padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 600;
  white-space: nowrap; flex-shrink: 0;
}
.status-todo { background: var(--surface2); color: var(--text2); }
.status-inprogress { background: rgba(59,130,246,.2); color: var(--primary); }
.status-done { background: rgba(34,197,94,.2); color: var(--green); }
.status-blocked { background: rgba(239,68,68,.2); color: var(--red); }
.add-task-btn {
  display: flex; align-items: center; gap: 4px;
  padding: 4px var(--spacing-sm); color: var(--primary);
  cursor: pointer; font-size: var(--font-size-sm); border: none; background: none;
}
.add-task-btn:hover { background: rgba(59,130,246,.08); }

/* ═══════════════════════════════════════ */
/* GANTT PANEL                             */
/* ═══════════════════════════════════════ */
.gantt-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.gantt-header {
  display: flex; border-bottom: 1px solid var(--border);
  background: var(--surface); flex-shrink: 0;
}
.gantt-week {
  min-width: 180px; text-align: center; padding: 4px;
  font-size: 10px; font-weight: 600; color: var(--text2);
  border-right: 1px solid rgba(71,85,105,.3);
}
.gantt-week .week-num { color: var(--primary); font-size: 11px; }
.gantt-week.current { background: rgba(59,130,246,.1); }
.gantt-body { flex: 1; overflow: auto; position: relative; }
.gantt-body::-webkit-scrollbar { width: 6px; height: 6px; }
.gantt-body::-webkit-scrollbar-track { background: var(--surface); }
.gantt-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.gantt-row {
  display: flex; height: 32px;
  border-bottom: 1px solid rgba(71,85,105,.15); position: relative;
}
.gantt-row.epic { height: 36px; background: var(--surface); }
.gantt-row-bg { display: flex; width: 100%; height: 100%; position: absolute; }
.gantt-row-bg-week {
  min-width: 180px; border-right: 1px solid rgba(71,85,105,.15);
}
.gantt-row-bg-week.current { background: rgba(59,130,246,.05); }
.gantt-cell { min-width: 180px; position: relative; border-right: 1px solid rgba(71,85,105,.15); }
.gantt-cell.today { background: rgba(59,130,246,.05); }
.gantt-bar {
  position: absolute; height: 22px; border-radius: 4px;
  display: flex; align-items: center; padding: 0 6px;
  font-size: 10px; font-weight: 600; color: #fff; white-space: nowrap;
  overflow: hidden; cursor: pointer; z-index: 2; top: 5px; min-width: 12px;
  transition: opacity 0.15s;
}
.gantt-bar:hover { opacity: 0.85; z-index: 3; box-shadow: 0 2px 8px rgba(0,0,0,.4); }
.gantt-bar.critical { box-shadow: 0 0 0 2px var(--red); }
.gantt-bar-progress {
  position: absolute; left: 0; top: 0; bottom: 0;
  background: #fff; opacity: .3; border-radius: 4px;
}
.gantt-bar-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; text-shadow: 0 1px 2px rgba(0,0,0,.5); }
.dep-line { position: absolute; pointer-events: none; z-index: 1; }

/* ═══════════════════════════════════════ */
/* BOARD VIEW                              */
/* ═══════════════════════════════════════ */
.board { display: flex; gap: var(--spacing-md); flex: 1; padding: var(--spacing-md); overflow-x: auto; }
.board-column {
  flex: 1; min-width: 240px; display: flex; flex-direction: column;
  background: var(--surface); border-radius: var(--radius-md); overflow: hidden;
}
.board-column-header {
  padding: var(--spacing-sm) var(--spacing-md); font-weight: 600;
  font-size: var(--font-size-sm); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0;
}
.board-column-header .count-badge {
  background: var(--surface2); padding: 1px 8px; border-radius: 10px;
  font-size: var(--font-size-xs); color: var(--text2);
}
.board-column-body { flex: 1; overflow-y: auto; padding: var(--spacing-sm); display: flex; flex-direction: column; gap: var(--spacing-xs); }
.board-card {
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: var(--spacing-sm); cursor: pointer; transition: border-color 0.2s;
}
.board-card:hover { border-color: var(--primary); }
.board-card .card-name { font-size: var(--font-size-sm); margin-bottom: 6px; }
.board-card .card-meta { display: flex; align-items: center; gap: var(--spacing-xs); flex-wrap: wrap; }
.board-card .card-progress {
  width: 100%; height: 3px; background: var(--border); border-radius: 2px; margin-top: 6px;
}
.board-card .card-progress-fill { height: 100%; border-radius: 2px; background: var(--green); }
.filter-bar {
  display: flex; align-items: center; gap: var(--spacing-sm);
  padding: 6px var(--spacing-md);
  background: var(--surface); border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.filter-group { display: flex; align-items: center; gap: 4px; }
.filter-group label { font-size: 11px; color: var(--text2); font-weight: 600; }
.filter-bar select, .filter-bar input { padding: 4px 8px; font-size: var(--font-size-xs); }
.filter-bar input[type="text"] { width: 180px; }
.stats { display: flex; gap: var(--spacing-md); margin-left: auto; font-size: var(--font-size-xs); color: var(--text2); }
.stats .stat-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 3px; }


/* ═══════════════════════════════════════ */
/* DETAIL PANEL                            */
/* ═══════════════════════════════════════ */
.detail-overlay {
  position: fixed; top: 0; right: 0; width: 380px; height: 100%;
  background: var(--surface); border-left: 1px solid var(--border);
  z-index: 100; transform: translateX(100%); transition: transform .2s;
  overflow-y: auto; padding: 16px;
}
.detail-overlay.open { transform: translateX(0); }
.detail-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--spacing-md); border-bottom: 1px solid var(--border);
}
.detail-header h3 { font-size: 15px; }
.detail-body { flex: 1; overflow-y: auto; padding: var(--spacing-md); }
.detail-field { margin-bottom: var(--spacing-md); }
.detail-field label {
  display: block; font-size: var(--font-size-xs); color: var(--text2);
  margin-bottom: var(--spacing-xs); text-transform: uppercase; letter-spacing: 0.5px;
}
.detail-field input, .detail-field select, .detail-field textarea {
  width: 100%;
}
.detail-field textarea { min-height: 60px; resize: vertical; }
.detail-field .range-row { display: flex; align-items: center; gap: var(--spacing-sm); }
.detail-field input[type="range"] { flex: 1; background: none; }
.detail-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--spacing-md); border-top: 1px solid var(--border);
}
.deps-selector { display: flex; flex-wrap: wrap; gap: var(--spacing-xs); max-height: 120px; overflow-y: auto; }
.dep-item {
  padding: 2px 8px; border-radius: 3px; font-size: var(--font-size-xs);
  cursor: pointer; border: 1px solid var(--border); background: var(--bg);
}
.dep-item.selected { background: var(--primary); color: #fff; border-color: var(--primary); }
.dep-item.warning { border-color: var(--red); }
.dep-warning { color: var(--red); font-size: var(--font-size-xs); margin-top: 4px; }

/* ═══════════════════════════════════════ */
/* ADMIN PANEL                             */
/* ═══════════════════════════════════════ */
.admin-modal {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6); z-index: 150;
  display: flex; align-items: center; justify-content: center;
}
.admin-content {
  background: var(--surface); border-radius: var(--radius-md);
  width: 700px; max-height: 80vh; display: flex; flex-direction: column;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.admin-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--spacing-md); border-bottom: 1px solid var(--border);
}
.admin-tabs { display: flex; gap: 2px; padding: 0 var(--spacing-md); background: var(--surface); border-bottom: 1px solid var(--border); padding-bottom: 8px; }
.admin-tab {
  padding: 6px 16px; border-radius: 4px 4px 0 0; border: none; background: transparent;
  color: var(--text2); cursor: pointer; font-size: 12px; font-weight: 600;
  transition: all .15s;
}
.admin-tab.active { background: var(--primary); color: #fff; }
.admin-tab:hover:not(.active) { background: var(--surface2); }
.admin-body { flex: 1; overflow-y: auto; padding: var(--spacing-md); }
.admin-table { width: 100%; border-collapse: collapse; }
.admin-table th {
  text-align: left; padding: 8px; font-size: var(--font-size-xs);
  color: var(--text2); border-bottom: 1px solid var(--border); text-transform: uppercase;
}
.admin-table td { padding: 5px 8px; border-bottom: 1px solid rgba(71,85,105,.3); font-size: var(--font-size-sm); }
.admin-table input, .admin-table select { padding: 4px 6px; font-size: var(--font-size-sm); }
.color-picker { width: 32px; height: 24px; padding: 0; border: 1px solid var(--border); cursor: pointer; border-radius: 3px; }
.admin-add-form {
  display: flex; gap: var(--spacing-sm); align-items: center;
  padding: var(--spacing-sm) 0; margin-top: var(--spacing-sm);
  border-top: 1px solid var(--border);
}

/* ═══════════════════════════════════════ */
/* SAVE BUTTON & MISC                      */
/* ═══════════════════════════════════════ */
.btn-update { background: var(--green); color: #fff; border: none; border-radius: 6px; padding: 6px 16px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .3s; display: inline-flex; align-items: center; gap: 5px; min-width: 90px; justify-content: center; }
.btn-update:hover { opacity: .9; }
.btn-update.saving { background: var(--surface2); color: var(--text2); pointer-events: none; }
@keyframes dotPulse { 0%,80%,100% { opacity: .3; } 40% { opacity: 1; } }
.saving-dots span { animation: dotPulse 1.4s infinite; font-size: 16px; line-height: 1; }
.saving-dots span:nth-child(2) { animation-delay: .2s; }
.saving-dots span:nth-child(3) { animation-delay: .4s; }
.delete-link { background: none; border: none; color: var(--text2); font-size: 11px; font-weight: 700; cursor: pointer; text-decoration: underline; opacity: .5; padding: 4px 0; }
.delete-link:hover { color: var(--red); opacity: 1; }
.resize-handle { position: absolute; top: 0; right: -3px; width: 8px; height: 100%; cursor: col-resize; z-index: 10; }
input[type=date] { width: 28px; min-width: 28px; padding: 0; border: none; background: transparent; cursor: pointer; opacity: .6; }
input[type=date]::-webkit-calendar-picker-indicator { filter: invert(.7); cursor: pointer; }
input[type=date]::-webkit-datetime-edit { display: none; }

/* ═══════════════════════════════════════ */
/* RESPONSIVE                              */
/* ═══════════════════════════════════════ */
@media (max-width: 768px) {
  .main { flex-direction: column; }
  .task-panel { width: 100%; min-width: 0; border-right: none; border-bottom: 1px solid var(--border); max-height: 40vh; }
  .gantt-panel { flex: 1; }
  .board { flex-wrap: wrap; }
  .board-column { min-width: 200px; }
  .detail-overlay { width: 100%; }
  .admin-content { width: 95vw; }
  .header { flex-wrap: wrap; gap: var(--spacing-xs); }
  .header-actions { flex-wrap: wrap; }
  .filter-bar { flex-wrap: wrap; }
}


/* ═══════════════════════════════════════ */
/* MODALS & TOASTS                         */
/* ═══════════════════════════════════════ */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6); z-index: 200;
  display: flex; align-items: center; justify-content: center;
}
.modal {
  background: var(--surface); border-radius: var(--radius-md);
  padding: var(--spacing-lg); min-width: 320px; max-width: 480px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.modal h3 { margin-bottom: var(--spacing-md); }
.modal p { color: var(--text2); margin-bottom: var(--spacing-md); font-size: var(--font-size-sm); }
.modal-actions { display: flex; gap: var(--spacing-sm); justify-content: flex-end; }
.toast {
  position: fixed; bottom: 20px; right: 20px; z-index: 300;
  padding: 10px 16px; border-radius: 6px;
  color: #fff; font-size: 13px; font-weight: 600;
  animation: toastIn 0.3s ease;
}
@keyframes toastIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.toast-success { background: var(--green); }
.toast-error { background: var(--red); }
.toast-info { background: var(--primary); }

</style>
</head>
<body>

<div id="root"></div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
<script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.23.9/babel.min.js"></script>

<script type="text/babel">

/* ═══════════════════════════════════════ */
/* MODULE 1: CONFIG & CONSTANTS            */
/* ═══════════════════════════════════════ */

const PROJECT_START = new Date(2026, 2, 3);
const NUM_WEEKS = 9;
const DAY_MS = 86400000;
const PRIORITIES = ['High', 'Medium', 'Low'];
const STATUSES = ['To Do', 'In Progress', 'Done', 'Blocked'];

/* ═══════════════════════════════════════ */
/* MODULE 2: DATE UTILITIES                */
/* ═══════════════════════════════════════ */

function parseDate(str) {
  if (!str) return null;
  const parts = str.split('/');
  if (parts.length !== 3) return null;
  const d = parseInt(parts[0], 10), m = parseInt(parts[1], 10) - 1, y = parseInt(parts[2], 10);
  const dt = new Date(y, m, d);
  if (dt.getDate() !== d || dt.getMonth() !== m || dt.getFullYear() !== y) return null;
  return dt;
}

function formatDate(dt) {
  if (!dt) return '';
  const d = String(dt.getDate()).padStart(2, '0');
  const m = String(dt.getMonth() + 1).padStart(2, '0');
  return d + '/' + m + '/' + dt.getFullYear();
}

function addDays(dt, n) {
  return new Date(dt.getTime() + n * DAY_MS);
}

function diffDays(a, b) {
  return Math.round((b.getTime() - a.getTime()) / DAY_MS);
}

function isWeekend(dt) {
  const day = dt.getDay();
  return day === 0 || day === 6;
}

function skipWeekend(dt) {
  let skipped = 0;
  let d = new Date(dt);
  while (isWeekend(d)) { d = addDays(d, 1); skipped++; }
  return { date: d, skipped };
}

function addWorkingDays(dt, n) {
  let d = new Date(dt);
  let remaining = n;
  while (remaining > 0) {
    d = addDays(d, 1);
    if (!isWeekend(d)) remaining--;
  }
  return d;
}

function getWorkingDaysBetween(a, b) {
  let count = 0;
  let d = new Date(a);
  while (d < b) {
    d = addDays(d, 1);
    if (!isWeekend(d)) count++;
  }
  return count;
}

function weekOfDate(dt) {
  return Math.floor(diffDays(PROJECT_START, dt) / 7);
}

function isValidDate(str) {
  if (!str || typeof str !== 'string') return false;
  const parts = str.split('/');
  if (parts.length !== 3) return false;
  const d = parseInt(parts[0], 10), m = parseInt(parts[1], 10), y = parseInt(parts[2], 10);
  if (isNaN(d) || isNaN(m) || isNaN(y)) return false;
  if (m < 1 || m > 12 || d < 1 || d > 31 || y < 2000) return false;
  const dt = new Date(y, m - 1, d);
  return dt.getDate() === d && dt.getMonth() === m - 1 && dt.getFullYear() === y;
}

/* MODULE 3: TASK LOGIC (pure functions)   */
/* ═══════════════════════════════════════ */

let nextId = 100;

function initNextId(tasks) {
  let maxId = 99;
  (tasks || []).forEach(epic => {
    if (epic.id > maxId) maxId = epic.id;
    (epic.children || []).forEach(t => { if (t.id > maxId) maxId = t.id; });
  });
  nextId = maxId + 1;
}

function genId() { return nextId++; }

function deepClone(obj) { return JSON.parse(JSON.stringify(obj)); }

function flattenTasks(tasks) {
  const result = [];
  (tasks || []).forEach(epic => {
    result.push(epic);
    if (epic.children && epic.expanded) {
      const sorted = [...epic.children].sort((a, b) => {
        const ta = TEAM_SORT_ORDER[a.team] ?? 99;
        const tb = TEAM_SORT_ORDER[b.team] ?? 99;
        return ta - tb || a.id - b.id;
      });
      sorted.forEach(t => result.push(t));
    }
  });
  return result;
}

function detectCircularDeps(taskId, deps, allTasks) {
  const taskMap = {};
  allTasks.forEach(epic => {
    (epic.children || []).forEach(t => { taskMap[t.id] = t; });
  });
  const visited = new Set();
  const stack = [...deps];
  while (stack.length > 0) {
    const id = stack.pop();
    if (id === taskId) return true;
    if (visited.has(id)) continue;
    visited.add(id);
    const t = taskMap[id];
    if (t && t.deps) t.deps.forEach(d => stack.push(d));
  }
  return false;
}

function autoSchedule(tasks) {
  const taskMap = {};
  const allChildren = [];
  tasks.forEach(epic => {
    (epic.children || []).forEach(t => {
      taskMap[t.id] = t;
      allChildren.push(t);
    });
  });

  // Topological sort
  const inDegree = {};
  allChildren.forEach(t => { inDegree[t.id] = 0; });
  allChildren.forEach(t => {
    (t.deps || []).forEach(depId => {
      if (taskMap[depId]) inDegree[t.id] = (inDegree[t.id] || 0) + 1;
    });
  });
  const queue = allChildren.filter(t => inDegree[t.id] === 0);
  const sorted = [];
  while (queue.length > 0) {
    const t = queue.shift();
    sorted.push(t);
    allChildren.forEach(other => {
      if ((other.deps || []).includes(t.id)) {
        inDegree[other.id]--;
        if (inDegree[other.id] === 0) queue.push(other);
      }
    });
  }

  // Forward pass
  sorted.forEach(t => {
    const startDt = parseDate(t.start);
    const endDt = parseDate(t.end);
    if (!startDt || !endDt) return;
    const duration = getWorkingDaysBetween(startDt, endDt);

    if (t.deps && t.deps.length > 0) {
      let maxEnd = null;
      t.deps.forEach(depId => {
        const dep = taskMap[depId];
        if (dep) {
          const depEnd = parseDate(dep.end);
          if (depEnd && (!maxEnd || depEnd > maxEnd)) maxEnd = depEnd;
        }
      });
      if (maxEnd) {
        let newStart = addDays(maxEnd, 1);
        const sw = skipWeekend(newStart);
        newStart = sw.date;
        t.start = formatDate(newStart);
        t.end = formatDate(addWorkingDays(newStart, duration));
      }
    } else {
      const sw = skipWeekend(startDt);
      if (sw.skipped > 0) {
        t.start = formatDate(sw.date);
        t.end = formatDate(addWorkingDays(sw.date, duration));
      }
    }
  });

  // Update Epic dates
  tasks.forEach(epic => {
    if (!epic.children || epic.children.length === 0) return;
    let minStart = null, maxEnd = null;
    epic.children.forEach(t => {
      const s = parseDate(t.start), e = parseDate(t.end);
      if (s && (!minStart || s < minStart)) minStart = s;
      if (e && (!maxEnd || e > maxEnd)) maxEnd = e;
    });
    if (minStart) epic.start = formatDate(minStart);
    if (maxEnd) epic.end = formatDate(maxEnd);
    // Epic progress = average of children
    const total = epic.children.reduce((sum, t) => sum + (t.pct || 0), 0);
    epic.pct = Math.round(total / epic.children.length);
  });

  return tasks;
}

function calculateCriticalPath(tasks) {
  const taskMap = {};
  const allChildren = [];
  tasks.forEach(epic => {
    (epic.children || []).forEach(t => {
      taskMap[t.id] = t;
      allChildren.push(t);
    });
  });
  if (allChildren.length === 0) return new Set();

  // Build dependency reverse map
  const dependents = {};
  allChildren.forEach(t => { dependents[t.id] = []; });
  allChildren.forEach(t => {
    (t.deps || []).forEach(depId => {
      if (dependents[depId]) dependents[depId].push(t.id);
    });
  });

  // Early start/finish (forward pass)
  const es = {}, ef = {};
  allChildren.forEach(t => {
    const s = parseDate(t.start), e = parseDate(t.end);
    es[t.id] = s ? diffDays(PROJECT_START, s) : 0;
    ef[t.id] = e ? diffDays(PROJECT_START, e) : 0;
  });

  // Late start/finish (reverse pass)
  const projectEnd = Math.max(...allChildren.map(t => ef[t.id]));
  const ls = {}, lf = {};
  allChildren.forEach(t => { lf[t.id] = projectEnd; ls[t.id] = projectEnd; });

  // Process in reverse topological order
  const reversed = [...allChildren].sort((a, b) => ef[b.id] - ef[a.id]);
  reversed.forEach(t => {
    const deps = dependents[t.id];
    if (deps.length > 0) {
      lf[t.id] = Math.min(...deps.map(id => ls[id]));
    } else {
      lf[t.id] = projectEnd;
    }
    const duration = ef[t.id] - es[t.id];
    ls[t.id] = lf[t.id] - duration;
  });

  // Float = LS - ES; critical if float === 0
  const criticalIds = new Set();
  allChildren.forEach(t => {
    const float = ls[t.id] - es[t.id];
    if (float === 0) criticalIds.add(t.id);
  });

  return criticalIds;
}

function lsSave(state) {
  try {
    localStorage.setItem('ptb-data', JSON.stringify({
      tasks: state.tasks, members: state.members,
      teamColors: state.teamColors, phaseColors: state.phaseColors,
      version: state.version
    }));
  } catch (e) { /* quota exceeded - ignore */ }
}

function lsLoad() {
  try {
    const raw = localStorage.getItem('ptb-data');
    return raw ? JSON.parse(raw) : null;
  } catch (e) { return null; }
}

async function apiCall(method, path, body, token) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json' }
  };
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API_BASE + path, opts);
  const data = await res.json();
  if (!res.ok) {
    const err = new Error(data.error || 'API error');
    err.status = res.status;
    err.data = data;
    throw err;
  }
  return data;
}

async function apiLoad(token) {
  return apiCall('GET', '/api/data', null, token);
}

async function apiSave(data, token) {
  return apiCall('POST', '/api/data', data, token);
}

function useAutoSave(data, token, version) {
  const timerRef = React.useRef(null);
  const dataRef = React.useRef(data);
  dataRef.current = data;

  React.useEffect(() => {
    if (!token || !data.tasks || data.tasks.length === 0) return;
    lsSave(data);
    if (timerRef.current) clearTimeout(timerRef.current);
    timerRef.current = setTimeout(async () => {
      try {
        await apiSave({ ...data, version }, token);
      } catch (e) {
        if (e.status === 409) return { conflict: true, serverVersion: e.data?.serverVersion };
        if (e.status === 401) return { authError: true };
      }
    }, DEBOUNCE_MS);
    return () => { if (timerRef.current) clearTimeout(timerRef.current); };
  }, [data, token, version]);

  React.useEffect(() => {
    const handler = () => lsSave(dataRef.current);
    window.addEventListener('beforeunload', handler);
    return () => window.removeEventListener('beforeunload', handler);
  }, []);
}

function useVersionPoll(token, currentVersion, onConflict) {
  React.useEffect(() => {
    if (!token) return;
    const interval = setInterval(async () => {
      try {
        const res = await apiCall('GET', '/api/version', null, token);
        if (res.version > currentVersion) onConflict(res);
      } catch (e) { /* ignore poll errors */ }
    }, POLL_INTERVAL_MS);
    return () => clearInterval(interval);
  }, [token, currentVersion]);
}

function exportExcel(data, teamColors) {
  const wb = new ExcelJS.Workbook();
  const ws = wb.addWorksheet('Build Plan');
  const headers = ['Task Name', 'Phase', 'Team', 'Assignee', 'Priority', 'Status', 'Start', 'End', 'Duration', 'Progress', 'Notes'];
  const headerRow = ws.addRow(headers);
  headerRow.eachCell(cell => {
    cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF2C3E50' } };
    cell.font = { bold: true, color: { argb: 'FFFFFFFF' } };
    cell.border = { bottom: { style: 'thin' } };
  });

  const flat = [];
  (data.tasks || []).forEach(epic => {
    (epic.children || []).forEach(t => flat.push({ ...t, phase: epic.name }));
  });

  flat.forEach(t => {
    const s = parseDate(t.start), e = parseDate(t.end);
    const dur = s && e ? getWorkingDaysBetween(s, e) : 0;
    const row = ws.addRow([t.name, t.phase, t.team, t.assignee, t.priority, t.status, t.start, t.end, dur, (t.pct || 0) + '%', t.notes || '']);
    // Team color
    const tc = teamColors[t.team];
    if (tc) row.getCell(3).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF' + tc.replace('#', '') } };
    row.getCell(3).font = { color: { argb: 'FFFFFFFF' } };
    // Status color
    const sc = { 'Done': 'FF27AE60', 'In Progress': 'FF3498DB', 'Blocked': 'FFE74C3C', 'To Do': 'FF555555' };
    if (sc[t.status]) { row.getCell(6).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: sc[t.status] } }; row.getCell(6).font = { color: { argb: 'FFFFFFFF' } }; }
    // Priority color
    const pc = { 'High': 'FFE74C3C', 'Medium': 'FFF1C40F', 'Low': 'FF2ECC71' };
    if (pc[t.priority]) row.getCell(5).font = { color: { argb: pc[t.priority] } };
  });

  ws.columns.forEach(col => { col.width = 18; });
  ws.getColumn(1).width = 30;
  ws.getColumn(11).width = 30;

  wb.xlsx.writeBuffer().then(buf => {
    const blob = new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = 'Poker_Build_Plan.xlsx'; a.click();
    URL.revokeObjectURL(url);
  });
}

function exportJiraCSV(data) {
  const statusMap = { 'To Do': 'To Do', 'In Progress': 'In Progress', 'Done': 'Done', 'Blocked': 'Blocked' };
  const lines = ['Summary,Issue Type,Epic Name,Epic Link,Status,Priority,Assignee,Start Date,Due Date,Original Estimate'];
  (data.tasks || []).forEach(epic => {
    lines.push(`"${epic.name}",Epic,"${epic.name}","","To Do","Medium","","","",""`);
    (epic.children || []).forEach(t => {
      const s = parseDate(t.start), e = parseDate(t.end);
      const dur = s && e ? getWorkingDaysBetween(s, e) : 0;
      const startISO = s ? `${s.getFullYear()}-${String(s.getMonth()+1).padStart(2,'0')}-${String(s.getDate()).padStart(2,'0')}` : '';
      const endISO = e ? `${e.getFullYear()}-${String(e.getMonth()+1).padStart(2,'0')}-${String(e.getDate()).padStart(2,'0')}` : '';
      lines.push(`"${t.name}",Task,"","${epic.name}","${statusMap[t.status] || t.status}","${t.priority}","${t.assignee}","${startISO}","${endISO}","${dur * 8}h"`);
    });
  });
  const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'Jira_Import_PTB.csv'; a.click();
  URL.revokeObjectURL(url);
}

function importExcel(file, callback) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, { type: 'array' });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });
      if (rows.length === 0) { callback(null, 'File Excel trong'); return; }

      // Detect header mapping
      const firstRow = rows[0];
      const keys = Object.keys(firstRow);
      const findKey = (keywords) => keys.find(k => keywords.some(kw => k.toLowerCase().includes(kw))) || null;
      const nameKey = findKey(['task', 'name', 'summary', 'ten']);
      const phaseKey = findKey(['phase', 'epic', 'giai doan']);
      const teamKey = findKey(['team', 'nhom']);
      const assigneeKey = findKey(['assignee', 'nguoi', 'assign']);
      const statusKey = findKey(['status', 'trang thai']);
      const priorityKey = findKey(['priority', 'uu tien']);
      const startKey = findKey(['start', 'bat dau']);
      const endKey = findKey(['end', 'ket thuc', 'due']);

      if (!nameKey) { callback(null, 'Khong tim thay cot Task Name'); return; }

      const phases = {};
      let epicId = 100;
      rows.forEach(row => {
        const phase = (phaseKey && row[phaseKey]) || 'Imported';
        if (!phases[phase]) { phases[phase] = { id: epicId++, name: phase, isEpic: true, phase, expanded: true, children: [] }; }
        const normalizeStatus = (s) => { const m = { 'done': 'Done', 'in progress': 'In Progress', 'blocked': 'Blocked', 'to do': 'To Do' }; return m[(s||'').toLowerCase()] || 'To Do'; };
        const normalizePriority = (p) => { const m = { 'high': 'High', 'medium': 'Medium', 'low': 'Low' }; return m[(p||'').toLowerCase()] || 'Medium'; };
        const normalizeDate = (d) => {
          if (!d) return formatDate(new Date());
          if (typeof d === 'number') { const dt = new Date((d - 25569) * 86400000); return formatDate(dt); }
          const str = String(d);
          if (str.includes('-')) { const p = str.split('-'); return `${p[2]}/${p[1]}/${p[0]}`; }
          if (str.includes('/')) return str;
          return formatDate(new Date());
        };
        phases[phase].children.push({
          id: epicId++, name: row[nameKey] || 'Unnamed',
          team: (teamKey && row[teamKey]) || '', assignee: (assigneeKey && row[assigneeKey]) || '',
          priority: normalizePriority(priorityKey && row[priorityKey]),
          status: normalizeStatus(statusKey && row[statusKey]),
          start: normalizeDate(startKey && row[startKey]),
          end: normalizeDate(endKey && row[endKey]),
          pct: 0, deps: [], notes: ''
        });
      });

      const tasks = Object.values(phases);
      const members = [];
      const seen = new Set();
      tasks.forEach(e => e.children.forEach(t => {
        if (t.assignee && !seen.has(t.assignee)) { seen.add(t.assignee); members.push({ name: t.assignee, team: t.team || 'Dev' }); }
      }));

      callback({ tasks, members }, null);
    } catch (err) {
      callback(null, 'Loi doc file Excel: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function LoginScreen({ onLogin }) {
  const [username, setUsername] = React.useState('');
  const [password, setPassword] = React.useState('');
  const [error, setError] = React.useState('');
  const [loading, setLoading] = React.useState(false);

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError('');
    setLoading(true);
    try {
      const res = await apiCall('POST', '/api/login', { username, password });
      onLogin(res.token, res.username);
    } catch (err) {
      setError(err.status === 401 ? 'Sai ten dang nhap hoac mat khau' : 'Loi ket noi server');
    }
    setLoading(false);
  };

  return (
    <div className="login-screen">
      <form className="login-box" onSubmit={handleSubmit}>
        <h2>Poker Texas Build Plan</h2>
        <div className="login-field">
          <label>Ten dang nhap</label>
          <input value={username} onChange={e => setUsername(e.target.value)} autoFocus />
        </div>
        <div className="login-field">
          <label>Mat khau</label>
          <input type="password" value={password} onChange={e => setPassword(e.target.value)} />
        </div>
        <button className="btn btn-primary login-btn" type="submit" disabled={loading}>
          {loading ? 'Dang nhap...' : 'Dang nhap'}
        </button>
        {error && <div className="login-error">{error}</div>}
      </form>
    </div>
  );
}

function TaskRow({ task, isEpic, indent, expanded, onToggle, onSelect, selected, teamColors, childCount, phaseColors }) {
  const priorityColor = task.priority === 'High' ? 'var(--red)' : task.priority === 'Medium' ? 'var(--yellow)' : 'var(--green)';
  const statusColor = task.status === 'Done' ? 'var(--green)' : task.status === 'In Progress' ? 'var(--primary)' : task.status === 'Blocked' ? 'var(--red)' : 'var(--text2)';

  if (isEpic) {
    const phaseColor = (phaseColors && phaseColors[task.name]) || 'var(--primary)';
    return (
      <div className="task-row epic" onClick={() => onSelect(task.id)}>
        <button className="expand-btn" onClick={e => { e.stopPropagation(); onToggle(task.id); }}>
          {expanded ? '▼' : '►'}
        </button>
        <span className="epic-name" style={{ color: phaseColor }}>{task.name}</span>
        <span className="epic-count">{childCount || 0} tasks</span>
      </div>
    );
  }

function GanttBar({ task, teamColors, isCritical, onClick, totalDays, startOffset }) {

  const width = diffDays(s, e) + 1;
  const pxPerDay = 180 / 7;
  return (
    <div
      className={`gantt-bar ${isCritical ? 'critical' : ''}`}
      style={{
        left: left * pxPerDay + 'px',
        width: Math.max(width * pxPerDay, 20) + 'px',
        background: teamColors[task.team] || '#555'
      }}
      onClick={e => { e.stopPropagation(); onClick(task.id); }}

      <div className="gantt-bar-progress" style={{ width: (task.pct || 0) + '%' }} />

function GanttPanel({ tasks, teamColors, criticalIds, selectedId, onSelect, scrollRef }) {
  const flat = flattenTasks(tasks);
  const weeks = [];
  const now = new Date();
  const currentWeek = weekOfDate(now);
  for (let i = 0; i < NUM_WEEKS; i++) {
    const wStart = addDays(PROJECT_START, i * 7);
    const wEnd = addDays(wStart, 6);
    weeks.push({
      label: `W${i + 1}`,
      sub: `${formatDate(wStart).slice(0, 5)} - ${formatDate(wEnd).slice(0, 5)}`,
      isCurrent: i === currentWeek
    });
  }
  return (
    <div className="gantt-panel" ref={scrollRef} onScroll={e => {
      if (scrollRef._syncTarget) scrollRef._syncTarget.scrollTop = e.target.scrollTop;
    }}>
      <div className="gantt-header">
        {weeks.map((w, i) => (
          <div key={i} className={`gantt-week ${w.isCurrent ? 'current' : ''}`}>
            <div>{w.label}</div>
            <div style={{ fontSize: '10px' }}>{w.sub}</div>
          </div>
        ))}
      </div>
      <div className="gantt-body">
        {flat.map(t => (
          <div key={t.id} className={`gantt-row ${t.isEpic ? 'epic' : ''}`}>
            <div className="gantt-row-bg">
              {weeks.map((w, i) => (
                <div key={i} className={`gantt-row-bg-week ${w.isCurrent ? 'current' : ''}`} />
              ))}
            </div>
            {!t.isEpic && (
              <GanttBar
                task={t} teamColors={teamColors}
                isCritical={criticalIds.has(t.id)}
                onClick={onSelect}
              />
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

function DatePicker({ value, onChange, label }) {
  const [text, setText] = React.useState(value || '');
  const valid = !text || isValidDate(text);
  React.useEffect(() => { setText(value || ''); }, [value]);

  const handleText = (v) => {
    setText(v);
    if (isValidDate(v)) onChange(v);
  };
  const handleNative = (e) => {
    const d = e.target.value;
    if (d) {
      const [y, m, dd] = d.split('-');
      const formatted = `${dd}/${m}/${y}`;
      setText(formatted);
      onChange(formatted);
    }
  };
  const toNative = () => {
    const dt = parseDate(text);
    if (!dt) return '';
    const y = dt.getFullYear();
    const m = String(dt.getMonth() + 1).padStart(2, '0');
    const d = String(dt.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  };

  return (
    <div style={{ display: 'flex', gap: '4px', alignItems: 'center' }}>
      <input
        value={text} onChange={e => handleText(e.target.value)}
        placeholder="DD/MM/YYYY"
        style={{ flex: 1, borderColor: valid ? '' : 'var(--red)' }}
      />
      <input type="date" value={toNative()} onChange={handleNative}
        style={{ width: 32, padding: 4, cursor: 'pointer' }} />
    </div>
  );
}

function DepsSelector({ value, onChange, allTasks, currentTaskId }) {
  const [warning, setWarning] = React.useState('');
  const available = [];
  allTasks.forEach(epic => {
    (epic.children || []).forEach(t => {
      if (t.id !== currentTaskId) available.push(t);
    });
  });

  const toggle = (id) => {
    const current = value || [];
    if (current.includes(id)) {
      onChange(current.filter(d => d !== id));
      setWarning('');
    } else {
      const newDeps = [...current, id];
      if (detectCircularDeps(currentTaskId, newDeps, allTasks)) {
        setWarning('Phat hien vong lap dependency!');
        return;
      }
      onChange(newDeps);
      setWarning('');
    }
  };

  return (
    <div>
      <div className="deps-selector">
        {available.map(t => (
          <span key={t.id}
            className={`dep-item ${(value || []).includes(t.id) ? 'selected' : ''}`}
            onClick={() => toggle(t.id)}
          >
            {t.id}. {t.name}
          </span>
        ))}
      </div>
      {warning && <div className="dep-warning">{warning}</div>}
    </div>
  );
}

      setTasks(data.tasks || []);
      setMembers(data.members || INIT_MEMBERS);
      setTeamColors(data.teamColors || INIT_TEAM_COLORS);
      setPhaseColors(data.phaseColors || INIT_PHASE_COLORS);
      setVersion(data.version || 1);
      initNextId(data.tasks || []);
    } catch (e) {
      // Fallback to localStorage then INITIAL_TASKS
      const cached = lsLoad();
      if (cached) {
        setTasks(cached.tasks || []);
        setMembers(cached.members || INIT_MEMBERS);
        setTeamColors(cached.teamColors || INIT_TEAM_COLORS);
        setPhaseColors(cached.phaseColors || INIT_PHASE_COLORS);
        setVersion(cached.version || 1);
        initNextId(cached.tasks || []);
      } else {
        const data = deepClone(INITIAL_TASKS);
        setTasks(data.tasks || []);
        setMembers(data.members || INIT_MEMBERS);
        setTeamColors(data.teamColors || INIT_TEAM_COLORS);
        setPhaseColors(data.phaseColors || INIT_PHASE_COLORS);
        setVersion(data.version || 1);
        initNextId(data.tasks || []);
      }
    }
    setIsLoading(false);
  }, []);

  // On mount: load data if token exists
  React.useEffect(() => {
    if (token) {
      loadData(token);
    } else {
      const data = deepClone(INITIAL_TASKS);
      setTasks(data.tasks || []);
      setMembers(data.members || INIT_MEMBERS);
      setTeamColors(data.teamColors || INIT_TEAM_COLORS);
      setPhaseColors(data.phaseColors || INIT_PHASE_COLORS);
      initNextId(data.tasks || []);
    }
  }, []);

  const handleLogin = (tkn, user) => {
    setToken(tkn);
    setUsername(user);
    localStorage.setItem('ptb-token', tkn);
    localStorage.setItem('ptb-username', user);
    loadData(tkn);
  };

  const handleLogout = () => {
    setToken(null);
    setUsername('');
    localStorage.removeItem('ptb-token');
    localStorage.removeItem('ptb-username');
    localStorage.removeItem('ptb-data');
    const data = deepClone(INITIAL_TASKS);
    setTasks(data.tasks || []);
    setMembers(data.members || INIT_MEMBERS);
    setTeamColors(data.teamColors || INIT_TEAM_COLORS);
    setPhaseColors(data.phaseColors || INIT_PHASE_COLORS);
    setVersion(1);
  };

  // Auto-save
  const autoSaveData = React.useMemo(() => ({
    tasks, members, teamColors, phaseColors, version
  }), [tasks, members, teamColors, phaseColors, version]);
  useAutoSave(autoSaveData, token, version);

  // Version poll
  useVersionPoll(token, version, (info) => {
    setShowConflict(true);
  });

  // Keyboard shortcuts
  React.useEffect(() => {
    const handler = (e) => {
      if (e.key === 'Escape') {
        if (showDetail) { setShowDetail(false); setSelectedTaskId(null); }
        else if (showAdmin) setShowAdmin(false);
        else if (confirm) setConfirm(null);
        else if (showDataMenu) setShowDataMenu(false);
      }
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        if (token) {
          lsSave({ tasks, members, teamColors, phaseColors, version });
          apiSave({ tasks, members, teamColors, phaseColors, version }, token)
            .then(() => showToastMsg('Da luu', 'success'))
            .catch(() => showToastMsg('Loi luu du lieu', 'error'));
        }
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [showDetail, showAdmin, confirm, showDataMenu, token, tasks, members, teamColors, phaseColors, version]);

  // Online/offline detection
  const [isOnline, setIsOnline] = React.useState(navigator.onLine);
  React.useEffect(() => {
    const on = () => setIsOnline(true);
    const off = () => setIsOnline(false);
    window.addEventListener('online', on);
    window.addEventListener('offline', off);
    return () => { window.removeEventListener('online', on); window.removeEventListener('offline', off); };
  }, []);

  const update = React.useCallback((fn) => {
    setTasks(prev => {
      const cloned = deepClone(prev);
      fn(cloned);
      return autoSchedule(cloned);
    });
  }, []);

  const criticalIds = React.useMemo(() => calculateCriticalPath(tasks), [tasks]);

  const selectedTask = React.useMemo(() => {
    for (const epic of tasks) {
      if (epic.id === selectedTaskId) return epic;
      for (const t of (epic.children || [])) {
        if (t.id === selectedTaskId) return t;
      }
    }
    return null;
  }, [tasks, selectedTaskId]);

  const handleSelect = (id) => {
    setSelectedTaskId(id);
    const task = tasks.find(e => e.id === id) || null;
    if (task && task.isEpic) {
      setShowDetail(false);
    } else {
      setShowDetail(true);
    }
  };

  const handleToggle = (epicId) => {
    update(ts => {
      const epic = ts.find(e => e.id === epicId);
      if (epic) epic.expanded = !epic.expanded;
    });
  };

  const handleAddTask = (epicId) => {
    update(ts => {
      const epic = ts.find(e => e.id === epicId);
      if (!epic) return;
      const newTask = {
        id: genId(),
        name: 'New Task',
        team: '',
        assignee: '',
        priority: 'Medium',
        status: 'To Do',
        start: formatDate(new Date()),
        end: formatDate(addWorkingDays(new Date(), 3)),
        pct: 0,
        deps: [],
        notes: ''
      };
      if (!epic.children) epic.children = [];
      epic.children.push(newTask);
    });
    showToastMsg('Da them task moi', 'success');
  };

  const handleUpdate = (updatedTask) => {
    update(ts => {
      for (const epic of ts) {
        const idx = (epic.children || []).findIndex(t => t.id === updatedTask.id);
        if (idx !== -1) {
          epic.children[idx] = { ...updatedTask };
          break;
        }
      }
    });
    showToastMsg('Da luu thay doi', 'success');
  };

  const handleDelete = (taskId) => {
    setConfirm({
      title: 'Xoa task',
      message: 'Ban co chac chan muon xoa task nay?',
      onConfirm: () => {
        update(ts => {
          for (const epic of ts) {
            const idx = (epic.children || []).findIndex(t => t.id === taskId);
            if (idx !== -1) {
              epic.children.splice(idx, 1);
              ts.forEach(ep => {
                (ep.children || []).forEach(t => {
                  if (t.deps) t.deps = t.deps.filter(d => d !== taskId);
                });
              });
              break;
            }
          }
        });
        setShowDetail(false);
        setSelectedTaskId(null);
        setConfirm(null);
        showToastMsg('Da xoa task', 'success');
      }
    });
  };

  const handleUpdateMembers = (newMembers) => {
    setMembers(newMembers);
  };

  const handleUpdateTeams = (newTeamColors) => {
    setTeamColors(newTeamColors);
  };

  const handleUpdatePhases = (newPhaseColors, action) => {
    setPhaseColors(newPhaseColors);
    if (action && action.type === 'add') {
      update(ts => {
        ts.push({
          id: genId(), name: action.phase, isEpic: true,
          phase: action.phase, expanded: true, children: []
        });
      });
    } else if (action && action.type === 'delete') {
      update(ts => {
        const idx = ts.findIndex(e => e.name === action.phase || e.phase === action.phase);
        if (idx !== -1) ts.splice(idx, 1);
      });
    }
  };

  const showToastMsg = (message, type) => {
    setToast({ message, type });
  };

  // Filtered tasks for Board view
  const filteredTasks = React.useMemo(() => {
    const flat = [];
    tasks.forEach(epic => {
      (epic.children || []).forEach(t => flat.push({ ...t, _phase: epic.name }));
    });
    return flat.filter(t => {
      if (filters.phase && t._phase !== filters.phase) return false;
      if (filters.team && t.team !== filters.team) return false;
      if (filters.status && t.status !== filters.status) return false;
      if (filters.search) {
        const s = filters.search.toLowerCase();
        if (!(t.name || '').toLowerCase().includes(s) && !(t.assignee || '').toLowerCase().includes(s)) return false;
      }
      return true;
    });
  }, [tasks, filters]);

  const stats = React.useMemo(() => ({
    total: filteredTasks.length,
    inProgress: filteredTasks.filter(t => t.status === 'In Progress').length,
    done: filteredTasks.filter(t => t.status === 'Done').length,
    blocked: filteredTasks.filter(t => t.status === 'Blocked').length,
  }), [filteredTasks]);

  // Build filtered tasks tree for Board view
  const filteredTasksTree = React.useMemo(() => {
    const filteredIds = new Set(filteredTasks.map(t => t.id));
    return tasks.map(epic => ({
      ...epic,
      children: (epic.children || []).filter(t => filteredIds.has(t.id))
    })).filter(epic => epic.children && epic.children.length > 0 || !filters.phase && !filters.team && !filters.status && !filters.search);
  }, [tasks, filteredTasks, filters]);

  if (!token) return <LoginScreen onLogin={handleLogin} />;

  if (isLoading) {
    return (
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100vh', color: 'var(--text)' }}>
        Dang tai du lieu...
      </div>
    );
  }

  return (
    <div className="app">
      {!isOnline && (
        <div style={{ background: 'var(--red)', color: '#fff', padding: '4px var(--spacing-md)', fontSize: 'var(--font-size-sm)', textAlign: 'center' }}>
          Mat ket noi mang - Du lieu chi luu local
        </div>
      )}
      <div className="header">
        <span className="header-title">Poker Texas Build Plan</span>
        <div className="header-actions">
          <div className="view-tabs">
            <button className={`view-tab ${view === 'gantt' ? 'active' : ''}`}
              onClick={() => setView('gantt')}>Gantt</button>
            <button className={`view-tab ${view === 'board' ? 'active' : ''}`}
              onClick={() => setView('board')}>Board</button>
          </div>
          <div style={{ position: 'relative' }}>
            <button className="btn btn-sm" onClick={() => setShowDataMenu(!showDataMenu)}>Du lieu ▾</button>
            {showDataMenu && (
              <div style={{
                position: 'absolute', top: '100%', right: 0, background: 'var(--surface)',
                border: '1px solid var(--border)', borderRadius: 'var(--radius-sm)',
                minWidth: 180, zIndex: 50, boxShadow: '0 4px 12px rgba(0,0,0,0.3)'
              }}>
                <button className="btn btn-sm" style={{ width: '100%', textAlign: 'left', borderRadius: 0 }}
                  onClick={() => { exportJSON({ tasks, members, teamColors, phaseColors }); setShowDataMenu(false); }}>Export JSON</button>
                <button className="btn btn-sm" style={{ width: '100%', textAlign: 'left', borderRadius: 0 }}
                  onClick={() => { exportExcel({ tasks, members, teamColors, phaseColors }, teamColors); setShowDataMenu(false); }}>Export Excel</button>
                <button className="btn btn-sm" style={{ width: '100%', textAlign: 'left', borderRadius: 0 }}
                  onClick={() => { exportJiraCSV({ tasks }); setShowDataMenu(false); }}>Export Jira CSV</button>
                <div style={{ borderTop: '1px solid var(--border)', margin: '4px 0' }} />
                <button className="btn btn-sm" style={{ width: '100%', textAlign: 'left', borderRadius: 0 }}
                  onClick={() => { jsonInputRef.current?.click(); setShowDataMenu(false); }}>Import JSON</button>
                <button className="btn btn-sm" style={{ width: '100%', textAlign: 'left', borderRadius: 0 }}
                  onClick={() => { excelInputRef.current?.click(); setShowDataMenu(false); }}>Import Excel</button>
                <div style={{ borderTop: '1px solid var(--border)', margin: '4px 0' }} />
                <button className="btn btn-sm" style={{ width: '100%', textAlign: 'left', borderRadius: 0, color: 'var(--red)' }}
                  onClick={() => {
                    setShowDataMenu(false);
                    setConfirm({
                      title: 'Reset du lieu',
                      message: 'Khoi phuc du lieu mac dinh? Tat ca thay doi se mat.',
                      onConfirm: () => {
                        const data = deepClone(INITIAL_TASKS);
                        setTasks(autoSchedule(data.tasks || []));
                        setMembers(data.members || INIT_MEMBERS);
                        setTeamColors(data.teamColors || INIT_TEAM_COLORS);
                        setPhaseColors(data.phaseColors || INIT_PHASE_COLORS);
                        initNextId(data.tasks || []);
                        setConfirm(null);
                        showToastMsg('Da reset du lieu', 'success');
                      }
                    });
                  }}>Reset mac dinh</button>
              </div>
            )}
          </div>
          <button className="btn btn-sm" onClick={() => setShowAdmin(true)}>Quan ly</button>
          <span className="header-user">{username}</span>
          <button className="btn btn-sm" onClick={handleLogout}>Dang xuat</button>
        </div>
      </div>
      <FilterBar filters={filters} onChange={setFilters}
        phases={phaseColors} teams={teamColors} stats={stats} />
      <div className="main">
        {view === 'gantt' && (
          <>
            <TaskPanel
              tasks={tasks} selectedId={selectedTaskId}
              onSelect={handleSelect} onToggle={handleToggle}
              onAddTask={handleAddTask} teamColors={teamColors}
              phaseColors={phaseColors} scrollRef={taskPanelRef}
            />
            <GanttPanel
              tasks={tasks} teamColors={teamColors}
              criticalIds={criticalIds} selectedId={selectedTaskId}
              onSelect={handleSelect} scrollRef={ganttPanelRef}
            />
          </>
        )}
        {view === 'board' && (
          <BoardView tasks={filteredTasksTree} teamColors={teamColors} onSelect={handleSelect} />
        )}
      </div>
      {showDetail && selectedTask && !selectedTask.isEpic && (
        <DetailPanel
          task={selectedTask} isOpen={showDetail}
          onClose={() => { setShowDetail(false); setSelectedTaskId(null); }}
          onUpdate={handleUpdate} onDelete={handleDelete}
          members={members} teamColors={teamColors} allTasks={tasks}
        />
      )}
      {showAdmin && (
        <AdminPanel
          isOpen={showAdmin} onClose={() => setShowAdmin(false)}
          members={members} teams={Object.keys(teamColors)}
          phases={Object.keys(phaseColors)}
          teamColors={teamColors} phaseColors={phaseColors}
          onUpdateMembers={handleUpdateMembers}
          onUpdateTeams={handleUpdateTeams}
          onUpdatePhases={handleUpdatePhases}
        />
      )}
      {showConflict && (
        <ConfirmDialog
          title="Du lieu da thay doi"
          message="Du lieu da thay doi boi nguoi khac. Ban co muon tai lai?"
          onConfirm={() => { setShowConflict(false); loadData(token); }}
          onCancel={() => setShowConflict(false)}
        />
      )}
      {confirm && (
        <ConfirmDialog
          title={confirm.title} message={confirm.message}
          onConfirm={confirm.onConfirm}
          onCancel={() => setConfirm(null)}
        />
      )}
      {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
      <input ref={jsonInputRef} type="file" accept=".json" style={{ display: 'none' }}
        onChange={e => {
          const file = e.target.files[0];
          if (!file) return;
          importJSON(file, (data, err) => {
            if (err) { showToastMsg(err, 'error'); return; }
            update(ts => {
              ts.length = 0;
              data.tasks.forEach(t => ts.push(t));
            });
            setMembers(data.members);
            setTeamColors(data.teamColors);
            setPhaseColors(data.phaseColors);
            initNextId(data.tasks);
            showToastMsg('Import JSON thanh cong', 'success');
          });
          e.target.value = '';
        }} />
      <input ref={excelInputRef} type="file" accept=".xlsx,.xls" style={{ display: 'none' }}
        onChange={e => {
          const file = e.target.files[0];
          if (!file) return;
          importExcel(file, (data, err) => {
            if (err) { showToastMsg(err, 'error'); return; }
            update(ts => {
              ts.length = 0;
              data.tasks.forEach(t => ts.push(t));
            });
            if (data.members) setMembers(data.members);
            initNextId(data.tasks);
            showToastMsg('Import Excel thanh cong: ' + data.tasks.reduce((s, e) => s + e.children.length, 0) + ' tasks', 'success');
          });
          e.target.value = '';
        }} />
    </div>
  );
}
