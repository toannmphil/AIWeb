<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--surface:#1e293b;--surface2:#334155;--border:#475569;--text:#e2e8f0;--text2:#94a3b8;--primary:#3b82f6;--primary-hover:#2563eb;--green:#22c55e;--yellow:#eab308;--red:#ef4444;--orange:#f97316;--purple:#a855f7;--cyan:#06b6d4;--pink:#ec4899}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh}
.app{display:flex;flex-direction:column;height:100vh}
/* Header */
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0}
.header h1{font-size:16px;font-weight:700;white-space:nowrap}
.header h1 span{color:var(--primary)}
.header-actions{display:flex;gap:8px;align-items:center}
.btn{padding:6px 14px;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .15s}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-hover)}
.btn-success{background:var(--green);color:#fff}.btn-success:hover{opacity:.9}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{background:var(--surface2)}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{opacity:.9}
.btn-sm{padding:4px 10px;font-size:11px}
/* Toolbar */
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:6px 16px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;flex-shrink:0}
.filter-group{display:flex;align-items:center;gap:4px}
.filter-group label{font-size:11px;color:var(--text2);font-weight:600}
select,input[type=text],input[type=date]{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-size:12px;outline:none}
select:focus,input:focus{border-color:var(--primary)}
.search-box{width:180px}
.stats{margin-left:auto;display:flex;gap:12px;font-size:11px;color:var(--text2)}
.stats .stat{display:flex;align-items:center;gap:4px}
.stats .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
/* Main content */
.main{display:flex;flex:1;overflow:hidden}
/* Task panel */
.task-panel{width:480px;min-width:400px;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.task-panel-header{padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.task-panel-header h2{font-size:13px;font-weight:700}
.task-list{flex:1;overflow-y:auto;overflow-x:hidden}
.task-list::-webkit-scrollbar{width:6px}
.task-list::-webkit-scrollbar-track{background:var(--surface)}
.task-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
/* Task rows */
.task-row{display:flex;align-items:center;padding:0 8px;height:32px;border-bottom:1px solid rgba(71,85,105,.3);cursor:pointer;transition:background .1s;font-size:12px}
.task-row:hover{background:rgba(59,130,246,.08)}
.task-row.selected{background:rgba(59,130,246,.15)}
.task-row.epic{background:rgba(59,130,246,.05);font-weight:700}
.task-row .expand-btn{width:18px;height:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:10px;flex-shrink:0;border-radius:3px;transition:all .15s}
.task-row .expand-btn:hover{background:var(--surface2)}
.task-row .indent{flex-shrink:0}
.task-row .task-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 6px}
.task-row .task-name input{background:transparent;border:none;color:var(--text);width:100%;font-size:12px;outline:none;font-family:inherit}
.task-row .team-badge{font-size:9px;padding:1px 5px;border-radius:3px;color:#fff;font-weight:600;flex-shrink:0;margin-right:4px;letter-spacing:.3px}
.task-row .priority-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-right:4px}
.task-row .status-badge{font-size:10px;padding:1px 6px;border-radius:3px;flex-shrink:0;font-weight:600}
.task-row .pct{font-size:10px;color:var(--text2);width:28px;text-align:right;flex-shrink:0}
.task-row .task-date{font-size:10px;color:var(--text2);width:44px;text-align:center;flex-shrink:0;font-variant-numeric:tabular-nums}
/* Gantt panel */
.gantt-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.gantt-header{display:flex;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.gantt-week{min-width:180px;text-align:center;padding:4px;border-right:1px solid rgba(71,85,105,.3);font-size:10px;font-weight:600;color:var(--text2)}
.gantt-week .week-num{color:var(--primary);font-size:11px}
.gantt-body{flex:1;overflow:auto;position:relative}
.gantt-body::-webkit-scrollbar{width:6px;height:6px}
.gantt-body::-webkit-scrollbar-track{background:var(--surface)}
.gantt-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.gantt-row{display:flex;height:32px;border-bottom:1px solid rgba(71,85,105,.15);position:relative}
.gantt-cell{min-width:180px;position:relative;border-right:1px solid rgba(71,85,105,.15)}
.gantt-cell.today{background:rgba(59,130,246,.05)}
.gantt-bar{position:absolute;top:5px;height:22px;border-radius:4px;display:flex;align-items:center;font-size:10px;font-weight:600;color:#fff;cursor:pointer;transition:opacity .15s;z-index:2;min-width:12px;padding:0 6px;overflow:hidden}

.gantt-bar .bar-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;text-shadow:0 1px 2px rgba(0,0,0,.5)}
.gantt-bar-progress{position:absolute;left:0;top:0;bottom:0;border-radius:4px;opacity:.3;background:#fff}
/* Dependency lines */
.dep-line{position:absolute;pointer-events:none;z-index:1}
/* Detail panel */
.detail-overlay{position:fixed;top:0;right:0;width:380px;height:100%;background:var(--surface);border-left:1px solid var(--border);z-index:100;transform:translateX(100%);transition:transform .2s;overflow-y:auto;padding:16px}
.detail-overlay.open{transform:translateX(0)}
.detail-overlay h3{font-size:14px;margin-bottom:12px}
.detail-overlay .field{margin-bottom:10px}
.detail-overlay .field label{display:block;font-size:11px;color:var(--text2);margin-bottom:3px;font-weight:600}
.detail-overlay .field input,.detail-overlay .field select,.detail-overlay .field textarea{width:100%;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:6px 8px;font-size:12px;outline:none;font-family:inherit}
.detail-overlay .field textarea{height:60px;resize:vertical}
.detail-overlay .close-btn{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer}
/* Team colors */
.team-Art{background:#9b59b6}.team-Dev{background:#2980b9}.team-Design{background:#e67e22}
.team-Multimedia{background:#1abc9c}.team-PM{background:#34495e}.team-OP{background:#7f8c8d}.team-QC{background:#c0392b}
.team-Client{background:#16a085}.team-Server{background:#8e44ad}
/* Priority colors */
.pri-High{background:var(--red)}.pri-Medium{background:var(--yellow)}.pri-Low{background:var(--green)}
/* Status colors */
.status-todo{background:var(--surface2);color:var(--text2)}
.status-progress{background:rgba(59,130,246,.2);color:var(--primary)}
.status-done{background:rgba(34,197,94,.2);color:var(--green)}
.status-blocked{background:rgba(239,68,68,.2);color:var(--red)}
/* Critical path */
.critical .gantt-bar{box-shadow:0 0 0 2px var(--red)}
/* Resize handle */
.resize-handle{position:absolute;top:0;right:-3px;width:8px;height:100%;cursor:col-resize;z-index:10}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;width:500px;max-height:80vh;overflow-y:auto}
.modal.wide{width:700px}
.modal h3{margin-bottom:12px;font-size:16px}
.modal .field{margin-bottom:10px}
.modal .field label{display:block;font-size:11px;color:var(--text2);margin-bottom:3px;font-weight:600}
.modal .field input,.modal .field select,.modal .field textarea{width:100%;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:6px 8px;font-size:12px;outline:none;font-family:inherit}
.modal .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
/* Admin */
.admin-tabs{display:flex;gap:2px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:8px}
.admin-tab{padding:6px 16px;border-radius:4px 4px 0 0;font-size:12px;font-weight:600;cursor:pointer;color:var(--text2);transition:all .15s}
.admin-tab.active{background:var(--primary);color:#fff}
.admin-tab:hover:not(.active){background:var(--surface2)}
.admin-table{width:100%;border-collapse:collapse;font-size:12px}
.admin-table th{text-align:left;padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text2);font-size:11px;font-weight:600}
.admin-table td{padding:5px 8px;border-bottom:1px solid rgba(71,85,105,.3)}
.admin-table tr:hover{background:rgba(59,130,246,.05)}
.admin-table input{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:3px 6px;font-size:12px;outline:none;width:100%}
.admin-table select{background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:3px 6px;font-size:12px;outline:none}
.confirm-dialog{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;width:420px}
.confirm-dialog h4{margin-bottom:8px;font-size:14px;color:var(--red)}
.confirm-dialog p{font-size:13px;margin-bottom:16px;color:var(--text2);line-height:1.5}
/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--green);color:#fff;padding:10px 16px;border-radius:6px;font-size:13px;font-weight:600;z-index:300;animation:slideIn .3s}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
/* Update btn */
.btn-update{background:var(--green);color:#fff;border:none;border-radius:6px;padding:6px 16px;font-size:12px;font-weight:600;cursor:pointer;transition:all .3s;display:inline-flex;align-items:center;gap:5px;min-width:90px;justify-content:center}
.btn-update:hover{opacity:.9}
.btn-update.saving{background:var(--surface2);color:var(--text2);pointer-events:none}
@keyframes dotPulse{0%,80%,100%{opacity:.3}40%{opacity:1}}
.saving-dots span{animation:dotPulse 1.4s infinite;font-size:16px;line-height:1}.saving-dots span:nth-child(2){animation-delay:.2s}.saving-dots span:nth-child(3){animation-delay:.4s}
.delete-link{background:none;border:none;color:var(--text2);font-size:11px;font-weight:700;cursor:pointer;text-decoration:underline;opacity:.5;padding:4px 0}.delete-link:hover{color:var(--red);opacity:1}
/* DatePicker */
input[type=date]{width:28px;min-width:28px;padding:0;border:none;background:transparent;cursor:pointer;opacity:.6}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.7);cursor:pointer}
input[type=date]::-webkit-datetime-edit{display:none}
/* Tabs */
.view-tabs{display:flex;gap:2px}
.view-tab{padding:5px 12px;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;color:var(--text2);transition:all .15s}
.view-tab.active{background:var(--primary);color:#fff}
.view-tab:hover:not(.active){background:var(--surface2)}
</style>

function d(s){const p=s.split('/');return new Date(+p[2],+p[1]-1,+p[0])}
function fmt(dt){if(!dt)return'';return `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}/${dt.getFullYear()}`}
function addDays(dt,n){return new Date(dt.getTime()+n*DAY_MS)}
function diffDays(a,b){return Math.round((b-a)/DAY_MS)}
function workingDays(a,b){let count=0;let cur=new Date(a);while(cur<=b){const day=cur.getDay();if(day!==0&&day!==6)count++;cur=new Date(cur.getTime()+DAY_MS)}return Math.max(count-1,0)}
function addWorkingDays(dt,n){let cur=new Date(dt);let added=0;while(added<n){cur=new Date(cur.getTime()+DAY_MS);const day=cur.getDay();if(day!==0&&day!==6)added++}return cur}
function weekOfDate(dt){return Math.floor(diffDays(PROJECT_START,dt)/7)}
// Skip weekend: Sat→Mon, Sun→Mon. Returns {date, skipped}
function skipWeekend(dt){
  const day=dt.getDay();
  if(day===6)return{date:addDays(dt,2),skipped:true};
  if(day===0)return{date:addDays(dt,1),skipped:true};
  return{date:dt,skipped:false};
}
// Validate DD/MM/YYYY string
function isValidDate(s){if(!s)return false;const p=s.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);if(!p)return false;const dt=new Date(+p[3],+p[2]-1,+p[1]);return dt.getDate()===+p[1]&&dt.getMonth()===+p[2]-1&&dt.getFullYear()===+p[3]}

function flattenTasks(tasks){
  const result=[];
  tasks.forEach(t=>{
    result.push(t);
    if(t.children && t.expanded){
      const sorted=[...t.children].sort((a,b)=>{
        const teamA=TEAM_SORT_ORDER.indexOf(a.team),teamB=TEAM_SORT_ORDER.indexOf(b.team);
        const tA=teamA===-1?999:teamA,tB=teamB===-1?999:teamB;
        if(tA!==tB)return tA-tB;
        if((a.assignee||'')<(b.assignee||''))return -1;
        if((a.assignee||'')>(b.assignee||''))return 1;
        return d(a.start)-d(b.start);
      });
      sorted.forEach(c=>result.push(c));
    }
  });
  return result;
}

function getAllTasks(tasks){
  const result=[];
  tasks.forEach(t=>{
    result.push(t);
    if(t.children)t.children.forEach(c=>result.push(c));
  });
  return result;
}

function findTask(tasks,id){
  for(const t of tasks){
    if(t.id===id)return t;
    if(t.children){const c=t.children.find(x=>x.id===id);if(c)return c;}
  }
  return null;
}

function autoSchedule(tasks){
  const all=getAllTasks(tasks);
  const map=new Map(all.map(t=>[t.id,t]));
  const visited=new Set();
  function resolve(t){
    if(visited.has(t.id)||!t.deps||t.deps.length===0)return;
    visited.add(t.id);
    let maxEnd=null;
    t.deps.forEach(depId=>{
      const dep=map.get(depId);
      if(dep){
        resolve(dep);
        const depEnd=d(dep.end);
        if(!maxEnd||depEnd>maxEnd)maxEnd=depEnd;
      }
    });
    if(maxEnd){
      const curStart=d(t.start);
      const curEnd=d(t.end);
      const duration=diffDays(curStart,curEnd);
      let newStart=addDays(maxEnd,1);
      newStart=skipWeekend(newStart).date;
      if(newStart>curStart){
        t.start=fmt(newStart);
        let newEnd=addDays(newStart,duration);
        newEnd=skipWeekend(newEnd).date;
        t.end=fmt(newEnd);
      }
    }
  }
  all.filter(t=>t.type!=='epic').forEach(t=>resolve(t));
  // Update epic dates
  tasks.forEach(ep=>{
    if(ep.type==='epic'&&ep.children&&ep.children.length>0){
      let minS=null,maxE=null;
      ep.children.forEach(c=>{
        const s=d(c.start),e=d(c.end);
        if(!minS||s<minS)minS=s;
        if(!maxE||e>maxE)maxE=e;
      });
      if(minS)ep.start=fmt(minS);
      if(maxE)ep.end=fmt(maxE);
    }
  });
}

function computeCriticalPath(tasks){
  const all=getAllTasks(tasks).filter(t=>t.type!=='epic');
  const map=new Map(all.map(t=>[t.id,t]));
  const ids=new Set();
  // Find the last task (latest end date)
  let latest=null;
  all.forEach(t=>{if(!latest||d(t.end)>d(latest.end))latest=t});
  if(!latest)return ids;
  // Trace back through deps
  function trace(t){
    ids.add(t.id);
    if(!t.deps)return;
    let maxDep=null;
    t.deps.forEach(depId=>{
      const dep=map.get(depId);
      if(dep&&(!maxDep||d(dep.end)>d(maxDep.end)))maxDep=dep;
    });
    if(maxDep)trace(maxDep);
  }
  trace(latest);
  return ids;
}

// DatePicker component: DD/MM/YYYY text input + calendar popup + weekend skip
function DatePicker({value,onChange,onWeekendSkip,label}){
  const ref=useRef(null);
  const [text,setText]=useState(value||'');
  useEffect(()=>{setText(value||'')},[value]);
  function handleText(e){
    let v=e.target.value;
    // Auto-insert slashes
    const digits=v.replace(/[^\d]/g,'');
    if(digits.length<=2)v=digits;
    else if(digits.length<=4)v=digits.slice(0,2)+'/'+digits.slice(2);
    else v=digits.slice(0,2)+'/'+digits.slice(2,4)+'/'+digits.slice(4,8);
    setText(v);
    if(isValidDate(v)){
      const dt=d(v);
      const sk=skipWeekend(dt);
      if(sk.skipped){
        const fixed=fmt(sk.date);
        setText(fixed);
        onChange(fixed);
        if(onWeekendSkip)onWeekendSkip(fixed);
      } else {
        onChange(v);
      }
    }
  }
  function handleCalendar(e){
    const p=e.target.value.split('-');
    const ddmm=`${p[2]}/${p[1]}/${p[0]}`;
    const dt=d(ddmm);
    const sk=skipWeekend(dt);
    if(sk.skipped){
      const fixed=fmt(sk.date);
      setText(fixed);
      onChange(fixed);
      if(onWeekendSkip)onWeekendSkip(fixed);
    } else {
      setText(ddmm);
      onChange(ddmm);
    }
  }
  const isoVal=value&&isValidDate(value)?value.split('/').reverse().join('-'):'';
  return(
    <div style={{display:'flex',gap:4,alignItems:'center'}}>
      <input type="text" value={text} onChange={handleText} placeholder="DD/MM/YYYY" maxLength={10}
        style={{flex:1,fontVariantNumeric:'tabular-nums'}}/>
      <input type="date" value={isoVal} onChange={handleCalendar} ref={ref}
        style={{width:28,padding:0,border:'none',background:'transparent',cursor:'pointer',opacity:.6}}/>
    </div>
  );
}

    function toJiraDate(dateStr){if(!dateStr)return'';const dt=d(dateStr);return`${String(dt.getDate()).padStart(2,'0')}/${MONTHS[dt.getMonth()]}/${String(dt.getFullYear()).slice(2)}`}

    });
    const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
    const link=document.createElement('a');

  function detectHeaders(headers){
    const find=keywords=>{for(const h of headers){const l=String(h).toLowerCase().trim();if(keywords.some(k=>l===k||l.includes(k)))return h}return null};
    return{id:find(['id']),phase:find(['phase','epic']),task:find(['task','summary','task name','name']),team:find(['team','label']),assignee:find(['assignee','assigned']),priority:find(['priority','pri']),status:find(['status','state']),start:find(['start date','start','begin']),end:find(['end date','end','due date','due']),pct:find(['% complete','complete','progress','pct']),deps:find(['dependencies','deps','depends']),notes:find(['notes','description','comment'])};
  }
  function normalizeDate(val){
    if(!val)return'';const str=String(val).trim();
    if(/^\d{2}\/\d{2}\/\d{4}$/.test(str))return str;
    if(typeof val==='number'||/^\d{5}$/.test(str)){const num=typeof val==='number'?val:parseInt(str);const dt=new Date((num-25569)*86400000);return fmt(dt)}
    const iso=str.match(/^(\d{4})-(\d{2})-(\d{2})/);if(iso)return`${iso[3]}/${iso[2]}/${iso[1]}`;
    const dt2=new Date(str);if(!isNaN(dt2.getTime()))return fmt(dt2);
    return'';
  }
  function normalizePct(val){
    if(val===null||val===undefined||val==='')return 0;
    const num=typeof val==='number'?val:parseFloat(String(val).replace('%',''));
    if(isNaN(num))return 0;
    if(num>0&&num<=1)return Math.round(num*100);
    return Math.max(0,Math.min(100,Math.round(num)));
  }
  function normalizePriority(val){const s=String(val).toLowerCase().trim();if(s.includes('high')||s==='h')return'High';if(s.includes('low')||s==='l')return'Low';return'Medium'}
  function normalizeStatus(val){const s=String(val).toLowerCase().trim();if(s.includes('progress')||s.includes('doing'))return'In Progress';if(s.includes('done')||s.includes('complete'))return'Done';if(s.includes('block'))return'Blocked';return'To Do'}
  function normalizeTeam(val){
    const str=String(val).trim();const teams=Object.keys(members);
    const exact=teams.find(t=>t.toLowerCase()===str.toLowerCase());if(exact)return exact;
    const partial=teams.find(t=>str.toLowerCase().includes(t.toLowerCase()));return partial||str;
  }

  // Import Excel file
  function importExcelFile(file){
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=new Uint8Array(ev.target.result);
        const workbook=XLSX.read(data,{type:'array'});
        const sheet=workbook.Sheets[workbook.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(sheet,{defval:''});
        if(rows.length===0){showToast('Excel file is empty');return}
        const hm=detectHeaders(Object.keys(rows[0]));
        if(!hm.task){showToast('Error: Could not find Task/Summary column');return}
        const idMap={};
        const imported=[];
        rows.forEach(row=>{
          const taskName=row[hm.task];if(!taskName||!String(taskName).trim())return;
          const newId=genId();
          const oldId=row[hm.id]||'';if(oldId)idMap[String(oldId).trim()]=newId;
          imported.push({
            id:newId,name:String(taskName).trim(),
            team:normalizeTeam(row[hm.team]||''),
            assignee:String(row[hm.assignee]||'').trim(),
            priority:normalizePriority(row[hm.priority]||'Medium'),
            status:normalizeStatus(row[hm.status]||'To Do'),
            start:normalizeDate(row[hm.start]||''),
            end:normalizeDate(row[hm.end]||''),
            pct:normalizePct(row[hm.pct]),
            deps:[],notes:String(row[hm.notes]||'').trim(),
            _phase:String(row[hm.phase]||'Production').trim(),
            _depsRaw:String(row[hm.deps]||'').trim()
          });
        });
        // Resolve deps
        imported.forEach(t=>{
          if(t._depsRaw){t.deps=t._depsRaw.split(/[,;]/).map(s=>s.trim()).filter(Boolean).map(s=>idMap[s]||null).filter(Boolean)}
          delete t._depsRaw;
        });
        // Group by phase
        const groups={};
        imported.forEach(t=>{const p=t._phase;if(!groups[p])groups[p]=[];groups[p].push(t);delete t._phase});
        const newTasks=Object.entries(groups).map(([phase,children])=>({id:genId(),name:phase,type:'epic',phase,expanded:true,children}));
        if(!confirm(`Import ${imported.length} tasks from Excel?\nSẽ thay thế toàn bộ tasks hiện tại.`))return;
        initNextId(newTasks);autoSchedule(newTasks);setTasks(newTasks);
        // Add new phases/teams if needed
        const np={};Object.keys(groups).forEach(p=>{if(!phaseColors[p])np[p]=PALETTE[Object.keys(groups).indexOf(p)%PALETTE.length]});
        if(Object.keys(np).length>0)setPhaseColors(prev=>({...prev,...np}));
        const nt={};imported.forEach(t=>{if(t.team&&!teamColors[t.team]&&!nt[t.team])nt[t.team]=PALETTE[Object.keys(nt).length%PALETTE.length]});
        if(Object.keys(nt).length>0)setTeamColors(prev=>({...prev,...nt}));
        showToast(`Imported ${imported.length} tasks from Excel!`);
      }catch(err){console.error(err);showToast('Error reading Excel: '+err.message)}
    };
    reader.readAsArrayBuffer(file);
  }

  // Import from JSON or Excel
  function importData(){
    const input=document.createElement('input');
    input.type='file';
    input.accept='.json,.xlsx,.xls';
    input.onchange=e=>{
      const file=e.target.files[0];if(!file)return;
      const ext=file.name.split('.').pop().toLowerCase();
      if(ext==='json'){
        const reader=new FileReader();
        reader.onload=ev=>{
          try{
            const data=JSON.parse(ev.target.result);
            if(Array.isArray(data)){initNextId(data);autoSchedule(data);setTasks(data)}
            else{
              if(data.tasks){initNextId(data.tasks);autoSchedule(data.tasks);setTasks(data.tasks)}
              if(data.members)setMembers(data.members);
              if(data.teamColors)setTeamColors(data.teamColors);
              if(data.phaseColors)setPhaseColors(data.phaseColors);
            }
            showToast('Loaded from JSON!');
          }catch(err){showToast('Error: invalid JSON file')}
        };
        reader.readAsText(file);
      }else if(ext==='xlsx'||ext==='xls'){
        importExcelFile(file);
      }else{showToast('Unsupported file type. Use .json or .xlsx')}
    };
    input.click();
  }

  // Reset to initial data
  function resetData(){
    if(!confirm('Reset toàn bộ dữ liệu về mặc định? Hành động này không thể hoàn tác!'))return;
    const t=JSON.parse(JSON.stringify(INITIAL_TASKS));
    initNextId(t);autoSchedule(t);
    setTasks(t);
    setMembers(JSON.parse(JSON.stringify(INIT_MEMBERS)));
    setTeamColors({...INIT_TEAM_COLORS});
    setPhaseColors({...INIT_PHASE_COLORS});
    localStorage.removeItem(LS_KEY);
    showToast('Reset to default!');
  }

  const selectedTask=selectedId?findTask(tasks,selectedId):null;

  // Init editBuffer when selecting a task
  useEffect(()=>{
    if(selectedId&&selectedTask&&selectedTask.type!=='epic'){
      const ep=tasks.find(ep=>ep.children&&ep.children.some(c=>c.id===selectedId));
      setEditBuffer({...selectedTask,phase:ep?ep.phase:''});
    } else {
      setEditBuffer(null);
    }
  },[selectedId]);

  return(
    <div className="app">
      {/* Header */}
      <div className="header">
        <h1>🎰 <span>Poker Texas Build</span> — Project Plan</h1>
        <div className="header-actions">
          <div className="view-tabs">
            <div className={`view-tab ${view==='gantt'?'active':''}`} onClick={()=>setView('gantt')}>📊 Gantt</div>

          </div>
          <button className="btn btn-ghost btn-sm" onClick={()=>setShowAdmin(true)}>⚙ Admin</button>
          <button className="btn btn-ghost btn-sm" onClick={importData}>📂 Import</button>
          <button className="btn btn-ghost btn-sm" onClick={saveData}>💾 Export</button>
          <button className="btn btn-ghost btn-sm" onClick={exportExcel}>📗 Excel</button>
          <button className="btn btn-ghost btn-sm" onClick={exportJira}>🔷 Jira CSV</button>
          <button className="btn btn-primary btn-sm" onClick={()=>setShowAdd(true)}>+ Add Task</button>
        </div>
      </div>

      {/* Toolbar */}
      <div className="toolbar">
        <div className="filter-group">
          <label>Phase:</label>
          <select value={filterPhase} onChange={e=>setFilterPhase(e.target.value)}>
            <option>All</option>
            {Object.keys(PHASE_COLORS).map(p=><option key={p}>{p}</option>)}
          </select>
        </div>
        <div className="filter-group">
          <label>Team:</label>
          <select value={filterTeam} onChange={e=>setFilterTeam(e.target.value)}>
            <option>All</option>
            {TEAMS.map(t=><option key={t}>{t}</option>)}
          </select>
        </div>
        <div className="filter-group">
          <label>Status:</label>
          <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
            <option>All</option>
            {STATUSES.map(s=><option key={s}>{s}</option>)}
          </select>
        </div>
        <input className="search-box" type="text" placeholder="🔍 Search task, member..." value={search} onChange={e=>setSearch(e.target.value)}/>
        <label style={{fontSize:11,display:'flex',alignItems:'center',gap:4,cursor:'pointer',color:'var(--text2)'}}>
          <input type="checkbox" checked={showCritical} onChange={e=>setShowCritical(e.target.checked)}/>

        </label>
        <div className="stats">
          <div className="stat"><span className="dot" style={{background:'var(--text2)'}}></span>{stats.total} total</div>
          <div className="stat"><span className="dot" style={{background:'var(--primary)'}}></span>{stats.progress} progress</div>
          <div className="stat"><span className="dot" style={{background:'var(--green)'}}></span>{stats.done} done</div>
          <div className="stat"><span className="dot" style={{background:'var(--red)'}}></span>{stats.blocked} blocked</div>
        </div>
      </div>

      {view==='gantt'?(
      <div className="main">
        {/* Task Panel */}
        <div className="task-panel">
          <div className="task-panel-header">
            <h2>Tasks ({stats.total})</h2>
          </div>
          <div style={{display:'flex',alignItems:'center',padding:'0 8px',height:24,borderBottom:'1px solid var(--border)',background:'var(--surface)',fontSize:10,fontWeight:700,color:'var(--text2)',flexShrink:0}}>
            <div style={{width:24}}></div>
            <div style={{width:38,textAlign:'center'}}>ID</div>
            <div style={{flex:1,paddingLeft:6}}>Task Name</div>
            <div style={{width:60,textAlign:'center'}}>Assignee</div>
            <div style={{width:44,textAlign:'center'}}>Start</div>
            <div style={{width:28,textAlign:'center'}}>Dur</div>
            <div style={{width:44,textAlign:'center'}}>End</div>
            <div style={{width:20,textAlign:'center'}}></div>
            <div style={{width:28,textAlign:'right'}}>%</div>
          </div>
          <div className="task-list" ref={taskListRef} onScroll={syncScroll}>
            {flat.map(t=>{
              const isEpic=t.type==='epic';
              const isCritical=criticalIds.has(t.id);
              return(
                <div key={t.id} className={`task-row ${isEpic?'epic':''} ${selectedId===t.id?'selected':''} ${isCritical?'critical':''}`}
                  onClick={()=>{setSelectedId(t.id);if(!isEpic)setShowDetail(true)}}>
                  {isEpic?(
                    <>
                      <div className="expand-btn" onClick={e=>{e.stopPropagation();toggleExpand(t.id)}}>
                        {t.expanded?'▼':'▶'}
                      </div>
                      <div className="task-name" style={{color:PHASE_COLORS[t.phase]}}>{t.name}</div>
                      <span style={{fontSize:10,color:'var(--text2)'}}>{t.children?t.children.length:0} tasks</span>
                    </>
                  ):(
                    <>
                      <div className="indent" style={{width:24}}></div>
                      <span style={{fontSize:9,color:'var(--text2)',width:38,textAlign:'center',flexShrink:0,fontVariantNumeric:'tabular-nums'}}>T{String(t.id).padStart(3,'0')}</span>
                      <div className="priority-dot" style={{background:t.priority==='High'?'var(--red)':t.priority==='Medium'?'var(--yellow)':'var(--green)'}}></div>
                      <span className="team-badge" style={{background:TEAM_COLORS[t.team]||'#666'}}>{t.team}</span>
                      <div className="task-name">{t.name}</div>
                      <span style={{fontSize:9,color:'var(--cyan)',width:60,textAlign:'center',flexShrink:0,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.assignee||''}</span>

                      <span style={{fontSize:9,color:'var(--text2)',width:28,textAlign:'center',flexShrink:0}}>{t.start&&t.end?workingDays(d(t.start),d(t.end)):0}d</span>
                      <span className="task-date">{t.end?t.end.slice(0,5):''}</span>
                      <span className={`status-badge status-${t.status==='To Do'?'todo':t.status==='In Progress'?'progress':t.status==='Done'?'done':'blocked'}`}>
                        {t.status==='To Do'?'○':t.status==='In Progress'?'◐':t.status==='Done'?'●':'✕'}
                      </span>
                      <span className="pct">{t.pct}%</span>
                    </>
                  )}
                </div>
              );
            })}
          </div>
        </div>

        {/* Gantt Panel */}
        <div className="gantt-panel">
          <div className="gantt-header">
            {weeks.map(w=>(
              <div key={w.num} className="gantt-week" style={{width:WEEK_WIDTH}}>
                <div className="week-num">W{w.num}</div>
                <div>{w.dateLabel}</div>
              </div>
            ))}
          </div>
          <div className="gantt-body" ref={ganttRef} onScroll={syncScroll}>
            {flat.map(t=>{
              const bar=getBarStyle(t);
              const isCritical=criticalIds.has(t.id);
              return(
                <div key={t.id} className={`gantt-row ${isCritical?'critical':''}`}>
                  {weeks.map(w=>{
                    const isToday=today>=w.start&&today<=w.end;
                    return <div key={w.num} className={`gantt-cell ${isToday?'today':''}`} style={{width:WEEK_WIDTH}}></div>
                  })}
                  {bar&&(
                    <div className="gantt-bar"
                      style={{
                        left:bar.left,
                        width:bar.width,
                        background:bar.bg,
                        opacity:bar.opacity||1,
                        height:bar.height||20,
                        top:bar.top||6,
                        boxShadow:isCritical?'0 0 0 2px var(--red)':'none'
                      }}
                      onClick={()=>{setSelectedId(t.id);if(t.type!=='epic')setShowDetail(true)}}
                      title={`${t.name}\n${t.start||''} → ${t.end||''}`}>
                      {t.type!=='epic'&&<div className="gantt-bar-progress" style={{width:`${t.pct||0}%`}}></div>}
                      {t.type!=='epic'&&<span className="bar-label">{t.name}</span>}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      </div>
      ):(
      /* Board View */
      <div style={{flex:1,display:'flex',gap:12,padding:12,overflow:'auto'}}>
        {STATUSES.map(status=>{
          const statusTasks=allFlat.filter(t=>t.type!=='epic'&&t.status===status);
          const filtered=statusTasks.filter(t=>{
            const matchTeam=filterTeam==='All'||t.team===filterTeam;
            const q=search.toLowerCase();const matchSearch=!search||t.name.toLowerCase().includes(q)||(t.assignee&&t.assignee.toLowerCase().includes(q));
            return matchTeam&&matchSearch;
          });
          return(
            <div key={status} style={{flex:1,minWidth:220,background:'var(--surface)',borderRadius:8,display:'flex',flexDirection:'column',overflow:'hidden'}}>
              <div style={{padding:'10px 12px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontWeight:700,fontSize:13}}>{status}</span>
                <span style={{fontSize:11,color:'var(--text2)',background:'var(--surface2)',padding:'2px 8px',borderRadius:10}}>{filtered.length}</span>
              </div>
              <div style={{flex:1,overflow:'auto',padding:8,display:'flex',flexDirection:'column',gap:6}}>
                {filtered.map(t=>(
                  <div key={t.id} style={{background:'var(--surface2)',borderRadius:6,padding:10,cursor:'pointer',borderLeft:`3px solid ${TEAM_COLORS[t.team]||'#666'}`}}
                    onClick={()=>{setSelectedId(t.id);setShowDetail(true)}}>
                    <div style={{fontSize:12,fontWeight:600,marginBottom:4}}>{t.name}</div>
                    <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
                      <span className="team-badge" style={{background:TEAM_COLORS[t.team]||'#666'}}>{t.team}</span>
                      <span style={{fontSize:10,color:'var(--text2)'}}>{t.assignee}</span>
                      <span style={{fontSize:10,color:t.priority==='High'?'var(--red)':t.priority==='Medium'?'var(--yellow)':'var(--green)',marginLeft:'auto',fontWeight:600}}>{t.priority}</span>
                    </div>
                    {t.pct>0&&<div style={{marginTop:6,height:3,background:'var(--border)',borderRadius:2}}><div style={{height:'100%',width:`${t.pct}%`,background:'var(--primary)',borderRadius:2}}></div></div>}
                  </div>
                ))}
              </div>
            </div>
          );
        })}
      </div>
      )}

      {/* Detail Panel */}
      <div className={`detail-overlay ${showDetail&&editBuffer?'open':''}`}>
        {editBuffer&&(()=>{
          const eb=editBuffer;
          const dur=eb.start&&eb.end?workingDays(d(eb.start),d(eb.end)):0;
          const setB=(field,val)=>setEditBuffer(prev=>({...prev,[field]:val}));
          return(
          <>
            <button className="close-btn" onClick={()=>setShowDetail(false)}>✕</button>
            <h3>{eb.name}</h3>
            <div className="field">
              <label>Task Name</label>
              <input value={eb.name} onChange={e=>setB('name',e.target.value)}/>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              <div className="field">
                <label>Phase</label>
                <select value={eb.phase} onChange={e=>setB('phase',e.target.value)}>
                  {Object.keys(PHASE_COLORS).map(p=><option key={p}>{p}</option>)}
                </select>
              </div>
              <div className="field">
                <label>Team</label>
                <select value={eb.team} onChange={e=>setB('team',e.target.value)}>
                  {TEAMS.map(t=><option key={t}>{t}</option>)}
                </select>
              </div>
              <div className="field">
                <label>Assignee</label>
                <select value={eb.assignee} onChange={e=>setB('assignee',e.target.value)}>
                  {ALL_MEMBERS.map(m=><option key={m}>{m}</option>)}
                </select>
              </div>
              <div className="field">
                <label>Priority</label>
                <select value={eb.priority} onChange={e=>setB('priority',e.target.value)}>
                  {PRIORITIES.map(p=><option key={p}>{p}</option>)}
                </select>
              </div>
              <div className="field">
                <label>Status</label>
                <select value={eb.status} onChange={e=>{
                  setB('status',e.target.value);
                  if(e.target.value==='Done')setB('pct',100);
                }}>
                  {STATUSES.map(s=><option key={s}>{s}</option>)}
                </select>
              </div>
              <div className="field">
                <label>Duration (working days)</label>
                <input type="number" min="0" value={dur} onChange={e=>{
                  const days=Math.max(0,parseInt(e.target.value)||0);
                  if(eb.start){const newEnd=addWorkingDays(d(eb.start),days);setB('end',fmt(newEnd))}
                }}/>
              </div>
              <div className="field">
                <label>Start Date</label>
                <DatePicker value={eb.start} onChange={v=>setB('start',v)}
                  onWeekendSkip={()=>showToast('⚠ Ngày rơi vào T7/CN, đã chuyển sang Thứ 2!')}/>
              </div>
              <div className="field">
                <label>End Date</label>
                <DatePicker value={eb.end} onChange={v=>setB('end',v)}
                  onWeekendSkip={()=>showToast('⚠ Ngày rơi vào T7/CN, đã chuyển sang Thứ 2!')}/>
              </div>
            </div>
            <div className="field">
              <label>Progress: {eb.pct}%</label>
              <input type="range" min="0" max="100" step="10" value={eb.pct}
                onChange={e=>setB('pct',+e.target.value)}
                style={{width:'100%',accentColor:'var(--primary)'}}/>
            </div>
            <div className="field">
              <label>Dependencies</label>
              <select multiple value={(eb.deps||[]).length===0?['root']:(eb.deps||[]).map(String)} onChange={e=>{
                const vals=[...e.target.selectedOptions].map(o=>o.value);
                if(vals.includes('root'))setB('deps',[]);
                else setB('deps',vals.map(Number));
              }} style={{height:100}}>
                <option value="root">───── (Root - No dependency) ─────</option>
                {allFlat.filter(t=>t.type!=='epic'&&t.id!==eb.id).map(t=>(
                  <option key={t.id} value={t.id}>{t.name}</option>
                ))}
              </select>
              <div style={{fontSize:10,color:'var(--text2)',marginTop:2}}>Hold Ctrl/Cmd to select multiple. Chọn Root = không phụ thuộc task nào.</div>
            </div>
            <div className="field">
              <label>Notes</label>
              <textarea value={eb.notes||''} onChange={e=>setB('notes',e.target.value)}/>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:12,marginTop:14}}>
              <button className={`btn-update ${updating?'saving':''}`} onClick={handleUpdate}>
                {updating?<span className="saving-dots"><span>.</span><span>.</span><span>.</span></span>:'✓ Update'}
              </button>
              <button className="delete-link" onClick={()=>{
                if(window.confirm(`Xác nhận xóa task "${eb.name}"?\nHành động này không thể hoàn tác!`))deleteTask(eb.id);
              }}>Delete Task</button>
            </div>
          </>
          );
        })()}
      </div>

      {/* Add Task Modal */}
      {showAdd&&<AddTaskModal tasks={tasks} teams={TEAMS} members={members} phaseColors={PHASE_COLORS} teamColors={TEAM_COLORS} onAdd={addTask} onClose={()=>setShowAdd(false)} showToast={showToast}/>}

      {/* Admin Modal */}
      {showAdmin&&<AdminModal
        members={members} setMembers={setMembers}
        teamColors={teamColors} setTeamColors={setTeamColors}
        phaseColors={phaseColors} setPhaseColors={setPhaseColors}
        tasks={tasks} update={update}
        showToast={showToast} onClose={()=>setShowAdmin(false)}
      />}

      {/* Toast */}
      {toast&&<div className="toast">{toast}</div>}
    </div>
  );
}

function AddTaskModal({tasks,teams,members,phaseColors,teamColors,onAdd,onClose,showToast}){
  const [name,setName]=useState('');
  const [team,setTeam]=useState(teams[0]||'Dev');
  const [assignee,setAssignee]=useState((members[teams[0]]||[''])[0]);
  const [priority,setPriority]=useState('Medium');
  const phases=Object.keys(phaseColors);
  const [phase,setPhase]=useState(phases[1]||phases[0]||'Production');
  const [start,setStart]=useState('18/03/2026');
  const [end,setEnd]=useState('25/03/2026');
  const [duration,setDuration]=useState(7);
  const [notes,setNotes]=useState('');
  const [deps,setDeps]=useState([]);
  const allFlat=getAllTasks(tasks).filter(t=>t.type!=='epic');

  useEffect(()=>{
    if(members[team])setAssignee(members[team][0]||'');
  },[team]);

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>➕ Add New Task</h3>
        <div className="field"><label>Task Name *</label><input value={name} onChange={e=>setName(e.target.value)} autoFocus/></div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          <div className="field"><label>Phase</label>
            <select value={phase} onChange={e=>setPhase(e.target.value)}>
              {phases.map(p=><option key={p}>{p}</option>)}
            </select>
          </div>
          <div className="field"><label>Team</label>
            <select value={team} onChange={e=>setTeam(e.target.value)}>
              {teams.map(t=><option key={t}>{t}</option>)}
            </select>
          </div>
          <div className="field"><label>Assignee</label>
            <select value={assignee} onChange={e=>setAssignee(e.target.value)}>
              {(members[team]||[]).map(m=><option key={m}>{m}</option>)}
            </select>
          </div>
          <div className="field"><label>Priority</label>
            <select value={priority} onChange={e=>setPriority(e.target.value)}>
              {PRIORITIES.map(p=><option key={p}>{p}</option>)}
            </select>
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr auto 1fr',gap:8}}>
          <div className="field"><label>Start Date</label>
            <DatePicker value={start} onChange={s=>{setStart(s);if(duration>0){const en=addWorkingDays(d(s),duration);setEnd(fmt(en))}}}
              onWeekendSkip={()=>showToast('⚠ Ngày rơi vào T7/CN, đã chuyển sang Thứ 2!')}/>
          </div>
          <div className="field"><label>Duration</label>
            <input type="number" min="0" value={duration} onChange={e=>{const days=Math.max(0,parseInt(e.target.value)||0);setDuration(days);if(start){const en=addWorkingDays(d(start),days);setEnd(fmt(en))}}} style={{width:70}}/>
          </div>
          <div className="field"><label>End Date</label>
            <DatePicker value={end} onChange={en=>{setEnd(en);if(start){setDuration(workingDays(d(start),d(en)))}}
            } onWeekendSkip={()=>showToast('⚠ Ngày rơi vào T7/CN, đã chuyển sang Thứ 2!')}/>
          </div>
        </div>
        <div className="field">
          <label>Dependencies</label>
          <select multiple value={deps.length===0?['root']:deps.map(String)} onChange={e=>{
            const vals=[...e.target.selectedOptions].map(o=>o.value);
            if(vals.includes('root'))setDeps([]);
            else setDeps(vals.map(Number));
          }} style={{height:100}}>
            <option value="root">───── (Root - No dependency) ─────</option>
            {allFlat.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
          </select>
          <div style={{fontSize:10,color:'var(--text2)',marginTop:2}}>Default: Root (không phụ thuộc). Ctrl/Cmd + click để chọn nhiều.</div>
        </div>
        <div className="field"><label>Notes</label><textarea value={notes} onChange={e=>setNotes(e.target.value)}/></div>
        <div className="actions">
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" disabled={!name} onClick={()=>onAdd({name,team,assignee,priority,phase,start,end,notes,deps})}>Create Task</button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════ */
/* Admin Modal - Member & Phase Management    */
/* ═══════════════════════════════════════════ */
function AdminModal({members,setMembers,teamColors,setTeamColors,phaseColors,setPhaseColors,tasks,update,showToast,onClose}){
  const [tab,setTab]=useState('members');
  const [confirm,setConfirm]=useState(null);

  // ── Member Management ──
  const [newMemberName,setNewMemberName]=useState('');
  const [newMemberTeam,setNewMemberTeam]=useState(Object.keys(members)[0]||'');
  const [editingMember,setEditingMember]=useState(null);
  const [editName,setEditName]=useState('');

  // ── Team Management ──
  const [newTeamName,setNewTeamName]=useState('');
  const [newTeamColor,setNewTeamColor]=useState('#9b59b6');

  // ── Phase Management ──
  const [newPhaseName,setNewPhaseName]=useState('');
  const [newPhaseColor,setNewPhaseColor]=useState('#3498db');
  const [editingPhase,setEditingPhase]=useState(null);
  const [editPhaseName,setEditPhaseName]=useState('');

  const teams=Object.keys(members);

  function addMember(){
    if(!newMemberName.trim()||!newMemberTeam)return;
    const name=newMemberName.trim();
    if(Object.values(members).flat().includes(name)){showToast('Member already exists!');return}
    setMembers(prev=>{const next={...prev};next[newMemberTeam]=[...(next[newMemberTeam]||[]),name];return next});
    setNewMemberName('');
    showToast(`Added ${name} to ${newMemberTeam}`);
  }

  function saveMemberEdit(team,oldName){
    if(!editName.trim())return;
    const name=editName.trim();
    setMembers(prev=>{
      const next={...prev};
      next[team]=next[team].map(m=>m===oldName?name:m);
      return next;
    });
    // Update tasks that reference this member
    update(t=>{
      getAllTasks(t).forEach(task=>{if(task.assignee===oldName)task.assignee=name});
    });
    setEditingMember(null);
    showToast(`Renamed ${oldName} → ${name}`);
  }

  function changeMemberTeam(oldTeam,memberName,newTeam){
    if(oldTeam===newTeam)return;
    setMembers(prev=>{
      const next={...prev};
      next[oldTeam]=next[oldTeam].filter(m=>m!==memberName);
      next[newTeam]=[...(next[newTeam]||[]),memberName];
      return next;
    });
    // Update tasks that reference this member
    update(t=>{
      getAllTasks(t).forEach(task=>{if(task.assignee===memberName)task.team=newTeam});
    });
    showToast(`Moved ${memberName} → ${newTeam}`);
  }

  function deleteMember(team,name){
    const taskCount=getAllTasks(tasks).filter(t=>t.assignee===name).length;
    if(taskCount>0){
      setConfirm({
        title:`Xóa member "${name}"?`,
        message:`Member này đang được assign cho ${taskCount} task(s). Các task đó sẽ bỏ trống assignee.`,
        action:()=>{
          setMembers(prev=>{const next={...prev};next[team]=next[team].filter(m=>m!==name);return next});
          update(t=>{getAllTasks(t).forEach(task=>{if(task.assignee===name)task.assignee=''})});
          setConfirm(null);
          showToast(`Deleted member ${name}`);
        }
      });
    } else {
      setMembers(prev=>{const next={...prev};next[team]=next[team].filter(m=>m!==name);return next});
      showToast(`Deleted member ${name}`);
    }
  }

  function addTeam(){
    if(!newTeamName.trim())return;
    const name=newTeamName.trim();
    if(members[name]){showToast('Team already exists!');return}
    setMembers(prev=>({...prev,[name]:[]}));
    setTeamColors(prev=>({...prev,[name]:newTeamColor}));
    setNewTeamName('');
    showToast(`Added team ${name}`);
  }

  function deleteTeam(teamName){
    const teamMembers=members[teamName]||[];
    const taskCount=getAllTasks(tasks).filter(t=>t.team===teamName).length;
    setConfirm({
      title:`Xóa team "${teamName}"?`,
      message:`Team có ${teamMembers.length} member(s) và ${taskCount} task(s). Tất cả member sẽ bị xóa${taskCount>0?` và ${taskCount} task(s) sẽ bỏ trống Team`:''}.`,
      action:()=>{
        setMembers(prev=>{const next={...prev};delete next[teamName];return next});
        setTeamColors(prev=>{const next={...prev};delete next[teamName];return next});
        if(taskCount>0)update(t=>{getAllTasks(t).forEach(task=>{if(task.team===teamName){task.team='';task.assignee=''}})});
        setConfirm(null);
        showToast(`Deleted team ${teamName}`);
      }
    });
  }

  // ── Phase Management ──
  function addPhase(){
    if(!newPhaseName.trim())return;
    const name=newPhaseName.trim();
    if(phaseColors[name]){showToast('Phase already exists!');return}
    setPhaseColors(prev=>({...prev,[name]:newPhaseColor}));
    // Create epic for this phase
    update(t=>{
      const newEpicId=genId();
      t.push({id:newEpicId,name:name,type:'epic',phase:name,expanded:true,children:[]});
    });
    setNewPhaseName('');
    showToast(`Added phase ${name}`);
  }

  function savePhaseEdit(oldName){
    if(!editPhaseName.trim()||editPhaseName.trim()===oldName)return;
    const newName=editPhaseName.trim();
    if(phaseColors[newName]){showToast('Phase name already exists!');return}
    setPhaseColors(prev=>{
      const next={};
      Object.entries(prev).forEach(([k,v])=>{next[k===oldName?newName:k]=v});
      return next;
    });
    update(t=>{
      t.forEach(ep=>{
        if(ep.phase===oldName){ep.phase=newName;ep.name=newName}
      });
    });
    setEditingPhase(null);
    showToast(`Renamed phase ${oldName} → ${newName}`);
  }

  function deletePhase(phaseName){
    const epic=tasks.find(ep=>ep.phase===phaseName);
    const taskCount=epic&&epic.children?epic.children.length:0;
    setConfirm({
      title:`⚠ Xóa Phase "${phaseName}"?`,
      message:`Hành động này sẽ xóa Phase và TẤT CẢ ${taskCount} task(s) bên trong. Không thể hoàn tác!`,
      action:()=>{
        setPhaseColors(prev=>{const next={...prev};delete next[phaseName];return next});
        update(t=>{
          const idx=t.findIndex(ep=>ep.phase===phaseName);
          if(idx>=0){
            const removedIds=(t[idx].children||[]).map(c=>c.id);
            t.splice(idx,1);
            getAllTasks(t).forEach(task=>{if(task.deps)task.deps=task.deps.filter(x=>!removedIds.includes(x))});
          }
        });
        setConfirm(null);
        showToast(`Deleted phase ${phaseName} and all its tasks`);
      }
    });
  }

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal wide" onClick={e=>e.stopPropagation()}>
        <h3>⚙ Admin — Quản lý Project</h3>
        <div className="admin-tabs">
          <div className={`admin-tab ${tab==='members'?'active':''}`} onClick={()=>setTab('members')}>👥 Members</div>
          <div className={`admin-tab ${tab==='teams'?'active':''}`} onClick={()=>setTab('teams')}>🏷 Teams</div>
          <div className={`admin-tab ${tab==='phases'?'active':''}`} onClick={()=>setTab('phases')}>📁 Phases</div>
        </div>

        {/* ── Members Tab ── */}
        {tab==='members'&&(
          <div>
            <div style={{display:'flex',gap:8,marginBottom:12,alignItems:'flex-end'}}>
              <div className="field" style={{flex:1,margin:0}}>
                <label>Tên Member</label>
                <input value={newMemberName} onChange={e=>setNewMemberName(e.target.value)} placeholder="VD: NguyenVA" onKeyDown={e=>e.key==='Enter'&&addMember()}/>
              </div>
              <div className="field" style={{width:140,margin:0}}>
                <label>Team</label>
                <select value={newMemberTeam} onChange={e=>setNewMemberTeam(e.target.value)}>
                  {teams.map(t=><option key={t}>{t}</option>)}
                </select>
              </div>
              <button className="btn btn-primary btn-sm" onClick={addMember} style={{height:30}}>+ Thêm</button>
            </div>
            <div style={{maxHeight:350,overflow:'auto'}}>
              {teams.map(team=>(
                <div key={team} style={{marginBottom:12}}>
                  <div style={{fontSize:12,fontWeight:700,color:teamColors[team]||'var(--text)',marginBottom:4,display:'flex',alignItems:'center',gap:6}}>
                    <span style={{display:'inline-block',width:10,height:10,borderRadius:'50%',background:teamColors[team]||'#666'}}></span>
                    {team} ({(members[team]||[]).length})
                  </div>
                  <table className="admin-table">
                    <tbody>
                    {(members[team]||[]).map(m=>(
                      <tr key={m}>
                        <td style={{width:'40%'}}>
                          {editingMember===`${team}:${m}`?(
                            <input value={editName} onChange={e=>setEditName(e.target.value)} autoFocus
                              onKeyDown={e=>{if(e.key==='Enter')saveMemberEdit(team,m);if(e.key==='Escape')setEditingMember(null)}}
                              onBlur={()=>saveMemberEdit(team,m)}/>
                          ):m}
                        </td>
                        <td style={{width:'20%'}}>
                          <select value={team} onChange={e=>changeMemberTeam(team,m,e.target.value)} style={{fontSize:11,padding:'2px 4px'}}>
                            {teams.map(t=><option key={t}>{t}</option>)}
                          </select>
                        </td>
                        <td style={{width:'15%',fontSize:10,color:'var(--text2)'}}>
                          {getAllTasks(tasks).filter(t=>t.assignee===m).length} tasks
                        </td>
                        <td style={{width:'25%',textAlign:'right'}}>
                          <button className="btn btn-ghost btn-sm" style={{padding:'2px 6px',display:'inline-flex'}}
                            onClick={()=>{setEditingMember(`${team}:${m}`);setEditName(m)}}>✏</button>
                          <button className="btn btn-ghost btn-sm" style={{padding:'2px 6px',display:'inline-flex',color:'var(--red)'}}
                            onClick={()=>deleteMember(team,m)}>✕</button>
                        </td>
                      </tr>
                    ))}
                    {(!members[team]||members[team].length===0)&&(
                      <tr><td colSpan={3} style={{color:'var(--text2)',fontStyle:'italic'}}>Chưa có member</td></tr>
                    )}
                    </tbody>
                  </table>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ── Teams Tab ── */}
        {tab==='teams'&&(
          <div>
            <div style={{display:'flex',gap:8,marginBottom:12,alignItems:'flex-end'}}>
              <div className="field" style={{flex:1,margin:0}}>
                <label>Tên Team mới</label>
                <input value={newTeamName} onChange={e=>setNewTeamName(e.target.value)} placeholder="VD: Marketing" onKeyDown={e=>e.key==='Enter'&&addTeam()}/>
              </div>
              <div className="field" style={{width:80,margin:0}}>
                <label>Màu</label>
                <input type="color" value={newTeamColor} onChange={e=>setNewTeamColor(e.target.value)} style={{height:30,padding:2}}/>
              </div>
              <button className="btn btn-primary btn-sm" onClick={addTeam} style={{height:30}}>+ Thêm Team</button>
            </div>
            <table className="admin-table">
              <thead><tr><th>Team</th><th>Members</th><th>Tasks</th><th>Màu</th><th></th></tr></thead>
              <tbody>
              {teams.map(team=>{
                const memberCount=(members[team]||[]).length;
                const taskCount=getAllTasks(tasks).filter(t=>t.team===team).length;
                return(
                  <tr key={team}>
                    <td style={{fontWeight:600}}><span style={{display:'inline-block',width:10,height:10,borderRadius:'50%',background:teamColors[team]||'#666',marginRight:6}}></span>{team}</td>
                    <td>{memberCount}</td>
                    <td>{taskCount}</td>
                    <td><input type="color" value={teamColors[team]||'#666'} onChange={e=>setTeamColors(prev=>({...prev,[team]:e.target.value}))} style={{width:40,height:22,padding:1,border:'none',cursor:'pointer'}}/></td>
                    <td style={{textAlign:'right'}}>
                      <button className="btn btn-ghost btn-sm" style={{padding:'2px 6px',display:'inline-flex',color:'var(--red)'}}
                        onClick={()=>deleteTeam(team)}>🗑 Xóa</button>
                    </td>
                  </tr>
                );
              })}
              </tbody>
            </table>
          </div>
        )}

        {/* ── Phases Tab ── */}
        {tab==='phases'&&(
          <div>
            <div style={{display:'flex',gap:8,marginBottom:12,alignItems:'flex-end'}}>
              <div className="field" style={{flex:1,margin:0}}>
                <label>Tên Phase mới</label>
                <input value={newPhaseName} onChange={e=>setNewPhaseName(e.target.value)} placeholder="VD: Post-launch" onKeyDown={e=>e.key==='Enter'&&addPhase()}/>
              </div>
              <div className="field" style={{width:80,margin:0}}>
                <label>Màu</label>
                <input type="color" value={newPhaseColor} onChange={e=>setNewPhaseColor(e.target.value)} style={{height:30,padding:2}}/>
              </div>
              <button className="btn btn-primary btn-sm" onClick={addPhase} style={{height:30}}>+ Thêm Phase</button>
            </div>
            <table className="admin-table">
              <thead><tr><th>Phase</th><th>Tasks</th><th>Màu</th><th></th></tr></thead>
              <tbody>
              {Object.entries(phaseColors).map(([phase,color])=>{
                const epic=tasks.find(ep=>ep.phase===phase);
                const taskCount=epic&&epic.children?epic.children.length:0;
                return(
                  <tr key={phase}>
                    <td style={{fontWeight:600}}>
                      {editingPhase===phase?(
                        <input value={editPhaseName} onChange={e=>setEditPhaseName(e.target.value)} autoFocus
                          onKeyDown={e=>{if(e.key==='Enter')savePhaseEdit(phase);if(e.key==='Escape')setEditingPhase(null)}}
                          onBlur={()=>savePhaseEdit(phase)}/>
                      ):(
                        <><span style={{display:'inline-block',width:10,height:10,borderRadius:'50%',background:color,marginRight:6}}></span>{phase}</>
                      )}
                    </td>
                    <td>{taskCount} tasks</td>
                    <td><input type="color" value={color} onChange={e=>setPhaseColors(prev=>({...prev,[phase]:e.target.value}))} style={{width:40,height:22,padding:1,border:'none',cursor:'pointer'}}/></td>
                    <td style={{textAlign:'right',whiteSpace:'nowrap'}}>
                      <button className="btn btn-ghost btn-sm" style={{padding:'2px 6px',display:'inline-flex'}}
                        onClick={()=>{setEditingPhase(phase);setEditPhaseName(phase)}}>✏ Sửa</button>
                      <button className="btn btn-ghost btn-sm" style={{padding:'2px 6px',display:'inline-flex',color:'var(--red)'}}
                        onClick={()=>deletePhase(phase)}>🗑 Xóa</button>
                    </td>
                  </tr>
                );
              })}
              </tbody>
            </table>
            <div style={{marginTop:12,padding:8,background:'rgba(239,68,68,.1)',borderRadius:6,fontSize:11,color:'var(--red)'}}>
              ⚠ Xóa Phase sẽ xóa TẤT CẢ tasks trong Phase đó. Hành động không thể hoàn tác!
            </div>
          </div>
        )}

        <div className="actions">
          <button className="btn btn-ghost" onClick={onClose}>Đóng</button>
        </div>
      </div>

      {/* Confirm Dialog */}
      {confirm&&(
        <div className="modal-overlay" style={{zIndex:250}} onClick={()=>setConfirm(null)}>
          <div className="confirm-dialog" onClick={e=>e.stopPropagation()}>
            <h4>{confirm.title}</h4>
            <p>{confirm.message}</p>
            <div className="actions">
              <button className="btn btn-ghost" onClick={()=>setConfirm(null)}>Hủy</button>
              <button className="btn btn-danger" onClick={confirm.action}>Xác nhận Xóa</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
